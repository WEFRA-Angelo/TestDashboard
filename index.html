<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Verlags-Standardisierung Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/firebase@10.12.2/firebase-app-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@10.12.2/firebase-database-compat.js"></script>
<style>
  :root{
    --bg:#f2f4f8;
    --card-bg:#ffffff;
    --text:#1f2733;
    --muted:#6b7688;
    --border:#e1e5eb;
    --accent:#3a5ded;
    --accent-dark:#2c46c4;
    --red:#e74c3c;
    --yellow:#f2a93b;
    --green:#27ae60;
    --grey:#9aa4b2;
    --radius:12px;
    --shadow:0 2px 8px rgba(20,30,60,0.08);
    --shadow-hover:0 6px 18px rgba(20,30,60,0.16);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);}
  .hidden{display:none !important;}
  header.topbar{
    position:sticky;top:0;z-index:50;background:linear-gradient(135deg,#1f2b52,#2c46c4);
    color:#fff;padding:14px 20px 0 20px;box-shadow:0 3px 10px rgba(0,0,0,0.15);
  }
  .topbar-row1{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
  .topbar-row1 h1{font-size:1.25rem;margin:0 0 8px 0;font-weight:600;}
  .sync-indicator{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.12);padding:6px 12px;border-radius:20px;font-size:0.85rem;margin-bottom:8px;}
  .sync-dot{width:10px;height:10px;border-radius:50%;background:var(--grey);flex-shrink:0;}
  .sync-dot.connected{background:var(--green);}
  .sync-dot.connecting{background:var(--yellow);animation:pulse 1s infinite;}
  .sync-dot.offline{background:var(--red);}
  @keyframes pulse{0%{opacity:1;}50%{opacity:0.3;}100%{opacity:1;}}
  .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:10px 0 12px 0;}
  .kpi-tile{background:rgba(255,255,255,0.1);border-radius:10px;padding:10px 12px;}
  .kpi-tile .kpi-value{font-size:1.3rem;font-weight:700;}
  .kpi-tile .kpi-label{font-size:0.78rem;color:#dfe4f5;margin-top:2px;}
  .kpi-tile.kpi-alert{background:rgba(231,76,60,0.35);}
  .progress-bar-outer{width:100%;height:6px;background:rgba(255,255,255,0.25);border-radius:4px;margin-top:6px;overflow:hidden;}
  .progress-bar-inner{height:100%;background:#4ade80;border-radius:4px;transition:width .3s;}
  .tabs{display:flex;gap:6px;padding-top:4px;}
  .tab-btn{background:rgba(255,255,255,0.08);border:none;color:#dfe4f5;padding:9px 18px;border-radius:8px 8px 0 0;cursor:pointer;font-size:0.9rem;}
  .tab-btn.active{background:var(--bg);color:var(--text);font-weight:600;}
  .toolbar{background:var(--bg);display:flex;gap:10px;flex-wrap:wrap;padding:12px 20px;align-items:center;}
  .toolbar input[type="text"], .toolbar select{
    padding:8px 10px;border-radius:8px;border:1px solid var(--border);font-size:0.9rem;background:#fff;
  }
  #searchInput{flex:1;min-width:180px;}
  #addVerlagBtn{background:var(--accent);color:#fff;border:none;padding:9px 16px;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.9rem;}
  #addVerlagBtn:hover{background:var(--accent-dark);}
  #resetWebsitesBtn{background:#eef1f8;color:var(--text);border:1px solid var(--border);padding:9px 16px;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.9rem;}
  #resetWebsitesBtn:hover{background:#e2e6f2;}
  .add-form{background:#fff;margin:0 20px 12px 20px;padding:12px;border-radius:10px;display:flex;gap:8px;flex-wrap:wrap;box-shadow:var(--shadow);}
  .add-form input{flex:1;min-width:180px;padding:8px 10px;border-radius:8px;border:1px solid var(--border);}
  .add-form button{padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-weight:600;}
  #confirmAddVerlag{background:var(--green);color:#fff;}
  #cancelAddVerlag{background:#eee;color:#333;}
main#mainContent{padding:0 20px 30px 20px;}
  .board{display:flex;gap:16px;overflow-x:auto;padding:6px 0 16px 0;align-items:flex-start;}
  .board-column{background:#e9ecf3;border-radius:var(--radius);min-width:290px;max-width:320px;flex:1 0 290px;display:flex;flex-direction:column;max-height:calc(100vh - 230px);}
  .column-header{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;font-weight:700;font-size:0.95rem;border-bottom:2px solid #d7dbe6;}
  .column-count{background:#fff;border-radius:12px;padding:2px 9px;font-size:0.8rem;color:var(--muted);}
  .column-sort{padding:8px 14px 0 14px;}
  .column-sort select{width:100%;padding:6px 8px;border-radius:7px;border:1px solid #cfd5e3;font-size:0.78rem;background:#fff;color:var(--text);}
  .card-list{padding:10px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;flex:1;min-height:60px;}
  .card-list.drag-over{background:#dbe2fb;}
  .kanban-card{background:var(--card-bg);border-radius:10px;padding:12px;box-shadow:var(--shadow);cursor:pointer;border:1px solid var(--border);transition:box-shadow .15s,transform .15s;}
  .kanban-card:hover{box-shadow:var(--shadow-hover);transform:translateY(-1px);}
  .kanban-card.dragging{opacity:0.4;}
  .card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .prio-badge{font-size:0.72rem;font-weight:700;padding:3px 9px;border-radius:12px;color:#fff;text-transform:uppercase;letter-spacing:.3px;}
  .prio-hoch{background:var(--red);}
  .prio-mittel{background:var(--yellow);color:#4a3200;}
  .prio-niedrig{background:var(--green);}
  .ampel-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 2px #fff, 0 0 0 3px rgba(0,0,0,0.06);}
  .ampel-green{background:var(--green);}
  .ampel-yellow{background:var(--yellow);}
  .ampel-red{background:var(--red);}
  .ampel-grey{background:var(--grey);}
  .card-title{margin:2px 0 8px 0;font-size:1rem;font-weight:700;}
  .card-meta{font-size:0.82rem;color:var(--muted);display:flex;flex-direction:column;gap:3px;margin-bottom:10px;}
  .meta-label{color:#8590a3;}
  .card-footer{border-top:1px dashed var(--border);padding-top:8px;}
  .status-select{width:100%;padding:6px 8px;border-radius:6px;border:1px solid var(--border);font-size:0.82rem;background:#f9fafc;}
  .empty-hint{color:var(--muted);font-size:0.85rem;padding:8px;text-align:center;}
  footer{text-align:center;color:var(--muted);font-size:0.8rem;padding:16px;border-top:1px solid var(--border);background:#fff;}

  .kpi-tile.kpi-accent{background:linear-gradient(135deg,#27ae60,#1e8449);box-shadow:0 0 0 1px rgba(255,255,255,0.2) inset;}
  .kpi-tile.kpi-accent .kpi-value{font-size:1.5rem;}

  .detail-wrap{background:#fff;border-radius:12px;box-shadow:var(--shadow);overflow:auto;max-height:calc(100vh - 260px);}
  table.detail-table{width:100%;border-collapse:collapse;font-size:0.87rem;}
  table.detail-table thead th{position:sticky;top:0;background:#eef1f8;z-index:3;text-align:left;padding:10px 12px;font-size:0.78rem;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);cursor:pointer;border-bottom:2px solid var(--border);white-space:nowrap;}
  table.detail-table thead th:hover{background:#e2e6f2;}
  table.detail-table thead th.sorted{color:var(--accent);}
  table.detail-table tbody tr.verlag-row{cursor:pointer;border-bottom:1px solid var(--border);}
  table.detail-table tbody tr.verlag-row:nth-child(4n+1){background:#fbfcfe;}
  table.detail-table tbody tr.verlag-row:hover{background:#eef2ff;}
  table.detail-table td{padding:9px 12px;vertical-align:middle;}
  .expand-arrow{display:inline-block;transition:transform .15s;margin-right:6px;color:var(--muted);}
  .expand-arrow.open{transform:rotate(90deg);}
  .status-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:0.72rem;font-weight:700;color:#fff;}
  .status-pipeline{background:var(--grey);}
  .status-austausch{background:var(--accent);}
  .status-test{background:var(--yellow);color:#4a3200;}
  .status-automatisiert{background:var(--green);}
  tr.detail-expand-row{background:#f7f8fc;}
  tr.detail-expand-row td{padding:0 12px 14px 32px;}
  .detail-website-block{padding:4px 0;margin-top:2px;}
  .detail-website-block.has-kanaele{background:#fff;border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-top:6px;}
  .detail-website-title{font-weight:700;margin-bottom:6px;font-size:0.85rem;}
  .detail-kanal-badges{display:flex;flex-wrap:wrap;gap:6px;}
  .kanal-badge{background:#eef1f8;border:1px solid var(--border);border-radius:14px;padding:3px 10px;font-size:0.75rem;color:var(--text);}
  .kanal-badge b{color:var(--accent-dark);}

  .modal-overlay{position:fixed;inset:0;background:rgba(15,20,35,0.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
  .modal-panel{background:#fff;border-radius:14px;width:720px;max-width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
  .modal-header{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:5;}
  .verlag-name-input{font-size:1.1rem;font-weight:700;border:none;border-bottom:2px solid transparent;flex:1;padding:4px 2px;}
  .verlag-name-input:focus{outline:none;border-bottom:2px solid var(--accent);}
  .btn-icon{background:none;border:none;font-size:1.1rem;cursor:pointer;padding:4px 8px;border-radius:6px;}
  .btn-icon:hover{background:#f0f2f7;}
  .close-btn{font-size:1.3rem;color:var(--muted);}
  .modal-body{padding:16px 20px 24px 20px;}
  .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
  .field-row.person-select-wrap{position:relative;}
  .new-person-form{background:#f4f6fb;border-radius:8px;padding:10px;margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;}
  .new-person-form input{flex:1;min-width:110px;padding:6px 8px;border-radius:6px;border:1px solid var(--border);font-size:0.85rem;}
  .new-person-form button{padding:6px 12px;border-radius:6px;border:none;background:var(--green);color:#fff;font-weight:600;cursor:pointer;font-size:0.82rem;}
  .kanal-typ-checks{display:flex;flex-wrap:wrap;gap:4px;align-items:center;background:#fff;border-radius:6px;padding:1px 4px;}
  .kanal-typ-checks label{display:flex;align-items:center;gap:2px;font-size:0.72rem;color:var(--text);cursor:pointer;white-space:nowrap;}
  .kanal-typ-checks input{margin:0;}
  .detail-website-line{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:0.85rem;font-weight:700;}
  .field-row{display:flex;flex-direction:column;gap:4px;}
  .field-row.small{margin:8px 0;}
  .field-row label{font-size:0.78rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
  .field-row input, .field-row select{padding:8px 10px;border-radius:8px;border:1px solid var(--border);font-size:0.9rem;}
  .section{margin-bottom:22px;}
  .section h3{display:block;width:100%;margin:0 0 10px 0;font-size:1rem;border-left:4px solid var(--accent);padding:8px 12px;background:rgba(58,93,237,0.08);border-radius:6px;box-sizing:border-box;}
  .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .section-header.small{margin:10px 0 6px 0;}
  .section-header h3{margin:0;}
  .btn-small{background:var(--accent);color:#fff;border:none;padding:6px 12px;border-radius:7px;font-size:0.8rem;cursor:pointer;font-weight:600;}
  .btn-small:hover{background:var(--accent-dark);}
  .btn-danger{background:var(--red);color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:600;}
  .override-toggle{background:#f4f6fb;padding:10px 12px;border-radius:8px;margin-bottom:10px;font-size:0.85rem;}
  .override-toggle label{display:flex;align-items:center;gap:8px;cursor:pointer;}
  textarea{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);font-family:inherit;font-size:0.9rem;resize:vertical;}
  .todo-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
  .todo-item{display:flex;align-items:center;gap:8px;background:#f7f8fb;padding:7px 10px;border-radius:8px;font-size:0.85rem;}
  .todo-item.done .todo-text{text-decoration:line-through;color:var(--muted);}
  .todo-item.todo-overdue{background:#fdeceb;}
  .todo-text{flex:1;}
  .todo-date{color:var(--muted);font-size:0.78rem;}
  .add-todo-row{display:flex;gap:6px;flex-wrap:wrap;}
  .add-todo-row input[type="text"]{flex:1;min-width:150px;padding:7px 9px;border-radius:7px;border:1px solid var(--border);}
  .add-todo-row input[type="date"]{padding:7px 9px;border-radius:7px;border:1px solid var(--border);}
  .modal-footer{border-top:1px solid var(--border);padding-top:14px;text-align:right;}

  /* NEUES kompaktes Website/Kanal-Layout */
  .website-list{display:flex;flex-direction:column;gap:2px;}
  .website-block{border-bottom:1px solid var(--border);padding:6px 2px;}
  .website-block:last-child{border-bottom:none;}
  .website-row{display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .website-name-line{display:flex;align-items:center;gap:6px;flex:1;min-width:0;}
  .website-name-input{border:none;background:transparent;font-weight:600;font-size:0.88rem;padding:3px 4px;flex:1;min-width:0;border-radius:5px;}
  .website-name-input:focus{outline:none;background:#fff;box-shadow:0 0 0 1px var(--accent);}
  .website-actions{display:flex;align-items:center;gap:4px;flex-shrink:0;}
  .website-actions .btn-small{padding:4px 10px;font-size:0.75rem;}
  .website-date-inline input[type=date]{padding:3px 5px;font-size:0.75rem;border-radius:6px;border:1px solid var(--border);}
  .kanal-chips-wrap{display:flex;flex-direction:column;gap:0;padding:2px 0;}
  .kanal-chip{background:#f7f8fb;border-radius:8px;padding:10px;margin-bottom:6px;display:flex;flex-direction:column;gap:8px;}
  .kanal-chip:last-child{margin-bottom:0;}
  .kanal-typ-checks{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .kanal-typ-checks label{position:relative;}
  .kanal-typ-checks label input[type=checkbox]{position:absolute;opacity:0;width:0;height:0;}
  .kanal-typ-checks label span.pill-label{display:inline-block;padding:6px 14px;border-radius:16px;font-size:0.8rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--muted);transition:background .15s,color .15s,border-color .15s;user-select:none;}
  .kanal-typ-checks label input[type=checkbox]:checked + span.pill-label{background:var(--accent);border-color:var(--accent);color:#fff;}
  .kanal-chip-row2{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
  .kanal-chip-row2 select{border:1px solid var(--border);background:#fff;font-size:0.82rem;padding:5px 8px;border-radius:6px;cursor:pointer;}
  .kanal-chip-row2 input[type=text]{border:1px solid var(--border);background:#fff;font-size:0.82rem;padding:5px 8px;border-radius:6px;flex:1;min-width:120px;}
  .kanal-chip-row2 .chip-remove{background:none;border:none;cursor:pointer;color:var(--muted);font-size:0.95rem;padding:4px 6px;line-height:1;border-radius:6px;}
  .kanal-chip-row2 .chip-remove:hover{color:#fff;background:var(--red);}
  .reminder-view{display:flex;flex-direction:column;gap:22px;padding-top:10px;}
  .reminder-section{background:#fff;border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);}
  .reminder-section h2{font-size:1.05rem;margin:0 0 12px 0;}
  .reminder-list{display:flex;flex-direction:column;gap:8px;}
  .reminder-item{display:flex;justify-content:space-between;align-items:center;gap:10px;background:#f7f8fb;padding:10px 12px;border-radius:9px;flex-wrap:wrap;}
  .reminder-sub{color:var(--muted);font-size:0.8rem;margin-top:2px;}

  @media (max-width:700px){
    .field-grid{grid-template-columns:1fr;}
    .board-column{min-width:82vw;max-width:82vw;}
    .kpi-row{grid-template-columns:repeat(2,1fr);}
    .modal-panel{width:100%;}
    .topbar-row1 h1{font-size:1.05rem;}
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-row1">
    <h1>📚 Verlags-Standardisierung Dashboard</h1>
    <div class="sync-indicator"><span class="sync-dot connecting" id="syncDot"></span><span id="syncText">Verbinde...</span></div>
  </div>
  <div class="kpi-row" id="kpiRow"></div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="kanban">Kanban-Board</button>
    <button class="tab-btn" data-tab="reminder">🔔 Reminder</button>
    <button class="tab-btn" data-tab="detail">📊 Detailansicht</button>
  </div>
</header>

<div class="toolbar" id="kanbanToolbar">
  <input id="searchInput" type="text" placeholder="🔍 Verlag, Kontakt suchen...">
  <select id="filterStatus">
    <option value="all">Alle Status</option>
    <option value="pipeline">Pipeline</option>
    <option value="austausch">Austausch</option>
    <option value="test">Test</option>
    <option value="automatisiert">Automatisiert</option>
  </select>
  <select id="filterPrio">
    <option value="all">Alle Prioritäten</option>
    <option value="hoch">Hoch</option>
    <option value="mittel">Mittel</option>
    <option value="niedrig">Niedrig</option>
  </select>
  <button id="addVerlagBtn">+ Neuer Verlag</button>
  <button id="resetWebsitesBtn">🔄 Websites aus Stammdaten wiederherstellen</button>
</div>
<div class="add-form hidden" id="addVerlagForm">
  <input type="text" id="newVerlagName" placeholder="Name des neuen Verlags...">
  <button id="confirmAddVerlag">Anlegen</button>
  <button id="cancelAddVerlag">Abbrechen</button>
</div>

<main id="mainContent">
  <section id="kanbanView" class="board">
    <div class="board-column" data-status="pipeline">
      <div class="column-header"><span>📋 Pipeline</span><span class="column-count" data-status="pipeline">0</span></div>
      <div class="column-sort"><select class="col-sort-select" data-status="pipeline"></select></div>
      <div class="card-list" data-status="pipeline"></div>
    </div>
    <div class="board-column" data-status="austausch">
      <div class="column-header"><span>🔄 Austausch</span><span class="column-count" data-status="austausch">0</span></div>
      <div class="column-sort"><select class="col-sort-select" data-status="austausch"></select></div>
      <div class="card-list" data-status="austausch"></div>
    </div>
    <div class="board-column" data-status="test">
      <div class="column-header"><span>🧪 Test</span><span class="column-count" data-status="test">0</span></div>
      <div class="column-sort"><select class="col-sort-select" data-status="test"></select></div>
      <div class="card-list" data-status="test"></div>
    </div>
    <div class="board-column" data-status="automatisiert">
      <div class="column-header"><span>✅ Automatisiert</span><span class="column-count" data-status="automatisiert">0</span></div>
      <div class="column-sort"><select class="col-sort-select" data-status="automatisiert"></select></div>
      <div class="card-list" data-status="automatisiert"></div>
    </div>
  </section>

  <section id="reminderView" class="reminder-view hidden"></section>
  <section id="detailView" class="hidden"></section>
</main>

<div id="modalOverlay" class="modal-overlay hidden"></div>

<footer>
  ⚠️ Testmodus / Demo-Daten, echte Verlagsdaten werden im nächsten Schritt eingepflegt.
</footer>

<script>

  var dbRef = null;

  var STATUS_LABELS = {pipeline:"Pipeline", austausch:"Austausch", test:"Test", automatisiert:"Automatisiert"};
  var PRIO_LABELS = {hoch:"Hoch", mittel:"Mittel", niedrig:"Niedrig"};

  var state = {
    verlage: {},
    personen: {},
    filter: {search:"", status:"all", prioritaet:"all"},
    selectedId: null,
    currentTab: "kanban",

  function uid(prefix){
    return (prefix||"id") + "_" + Date.now().toString(36) + Math.random().toString(36).slice(2,9);

  function todayISO(){

  function esc(str){
    if(str === undefined || str === null) return "";
    return String(str).replace(/[&<>"']/g, function(s){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[s];
    });
  }
  function formatDate(iso){
    if(!iso || iso === "9999-99-99" || iso === "0000-00-00") return "–";
    var parts = iso.split("-");
    if(parts.length !== 3) return iso;
    return parts[2] + "." + parts[1] + "." + parts[0];
  }

  function workdaysSince(dateStr){
    if(!dateStr) return null;
    var start = new Date(dateStr + "T00:00:00");
    if(isNaN(start.getTime())) return null;
    var end = new Date();
    end.setHours(0,0,0,0);
    start.setHours(0,0,0,0);
    if(start >= end) return 0;
    var count = 0;
    var cur = new Date(start);
    cur.setDate(cur.getDate()+1);
    while(cur <= end){
      var day = cur.getDay();
      if(day !== 0 && day !== 6) count++;
      cur.setDate(cur.getDate()+1);
    }
    return count;
  }
  function ampelInfo(dateStr){
    if(!dateStr) return {level:"grey", workdays:null, text:"Kein Kontaktdatum erfasst"};
    var wd = workdaysSince(dateStr);
    if(wd >= 3) return {level:"red", workdays:wd, text: wd + " Werktage seit letztem Kontakt – überfällig"};
    if(wd === 2) return {level:"yellow", workdays:wd, text: wd + " Werktage seit letztem Kontakt – bald fällig"};
    return {level:"green", workdays:wd, text: wd + " Werktag(e) seit letztem Kontakt"};
  }
  function getEffectiveContacts(v){
    if(v.websitesUnabhaengig && v.websites && Object.keys(v.websites).length > 0){
      return Object.keys(v.websites).map(function(wid){
        var w = v.websites[wid];
        return {label: w.name, date: w.letzterKontakt || null, isWebsite:true, wid: wid};
      });
    }
    return [{label: v.name, date: v.letzterKontakt || null, isWebsite:false, wid:null}];
  }
  function getVerlagAmpel(v){
    var contacts = getEffectiveContacts(v);
    var rank = {grey:3, red:2, yellow:1, green:0};
    var worst = null;
    contacts.forEach(function(c){
      var info = ampelInfo(c.date);
      if(!worst || rank[info.level] > rank[worst.level]) worst = info;
    });
    return worst || {level:"grey", workdays:null, text:"Kein Datum"};
  }

  function sortVerlagIds(ids, sortKey){
    var arr = ids.slice();
    function val(id){ return state.verlage[id]; }
    switch(sortKey){
      case "prio-desc":
        arr.sort(function(a,b){ return (PRIO_RANK[val(b).prioritaet]||0) - (PRIO_RANK[val(a).prioritaet]||0); });
        break;
      case "prio-asc":
        arr.sort(function(a,b){ return (PRIO_RANK[val(a).prioritaet]||0) - (PRIO_RANK[val(b).prioritaet]||0); });
        break;
      case "name-asc":
        arr.sort(function(a,b){ return (val(a).name||"").localeCompare(val(b).name||""); });
        break;
      case "name-desc":
        arr.sort(function(a,b){ return (val(b).name||"").localeCompare(val(a).name||""); });
        break;
      case "wichtigkeit-desc":
        arr.sort(function(a,b){ return (numOrNeg(val(b).wichtigkeitProzent)) - (numOrNeg(val(a).wichtigkeitProzent)); });
        break;
      case "wichtigkeit-asc":
        arr.sort(function(a,b){ return (numOrPos(val(a).wichtigkeitProzent)) - (numOrPos(val(b).wichtigkeitProzent)); });
        break;
      case "kontakt-asc":
        arr.sort(function(a,b){ return (getOldestContactDate(val(a))||"9999-99-99").localeCompare(getOldestContactDate(val(b))||"9999-99-99"); });
        break;
      case "kontakt-desc":
        arr.sort(function(a,b){ return (getOldestContactDate(val(b))||"0000-00-00").localeCompare(getOldestContactDate(val(a))||"0000-00-00"); });
        break;
      case "websites-desc":
        arr.sort(function(a,b){ return websiteCount(val(b)) - websiteCount(val(a)); });
        break;
      case "websites-asc":
        arr.sort(function(a,b){ return websiteCount(val(a)) - websiteCount(val(b)); });
        break;
      default: break;
    }
    return arr;
  }

  function buildSeedVerlage(){
    var out = {};
    SEED_RAW.forEach(function(entry){
      var name = entry[0], wichtigkeit = entry[1], ranking = entry[2];
      var vid = uid("v");
      out[vid] = {
        name: name,
        kontaktVerlag: "",
        zustaendigIntern: "",
        prioritaet: "mittel",
        status: "pipeline",
        letzterKontakt: "",
        websitesUnabhaengig: false,
        notizen: "",
        todos: [],
        websites: {},
        wichtigkeitProzent: wichtigkeit,
        ranking: ranking
      };
    });
    return out;
  }

  function restoreWebsitesFromSeed(){
    var seedByName = {};
    SEED_RAW.forEach(function(entry){
      seedByName[entry[0]] = entry[3] || [];
    });
    var updatesForFirebase = {};
    Object.keys(state.verlage).forEach(function(vid){
      var v = state.verlage[vid];
      var seedWebsites = seedByName[v.name];
      if(!seedWebsites) return;
      if(!v.websites) v.websites = {};
      var existingNames = {};
      Object.keys(v.websites).forEach(function(wid){
        var wname = v.websites[wid].name;
        if(wname) existingNames[wname] = true;
      });
      seedWebsites.forEach(function(wEntry){
        var wName = wEntry[0];
        if(!existingNames[wName]){
          var newWid = uid("w");
          v.websites[newWid] = {name: wName, letzterKontakt: "", kanaele: {}};
        }
      });
      updatesForFirebase[vid] = v;
    });
    if(usingFirebase && dbRef){
      dbRef.update(updatesForFirebase).catch(function(err){ console.error("Website-Restore fehlgeschlagen:", err); });
    }
    renderApp();
  }

  function seedIfEmpty(){
    if(usingFirebase && dbRef){
      var seed = buildSeedVerlage();
      var updates = {};
      Object.keys(seed).forEach(function(id){ updates[id] = seed[id]; });
      dbRef.update(updates).catch(function(err){ console.error("Seed-Import fehlgeschlagen:", err); });
    } else {
      state.verlage = buildSeedVerlage();
      renderApp();
    }
  }

  function fallbackLocal(){
    usingFirebase = false;
    setSyncStatus("offline");
    if(Object.keys(state.verlage).length === 0){
      state.verlage = buildSeedVerlage();
    }
    renderApp();
  }

  function initFirebase(){
    if(typeof firebase === "undefined"){
      console.warn("Firebase SDK nicht verfügbar - lokaler Fallback aktiv.");
      fallbackLocal();
      return;
    }
    try {
      firebase.initializeApp(firebaseConfig);
      var db = firebase.database();
      dbRef = db.ref("verlage");
      dbRef2 = db.ref("personen");
      usingFirebase = true;

      db.ref(".info/connected").on("value", function(snap){
        if(snap.val() === true){ setSyncStatus("connected"); }
        else { setSyncStatus("connecting"); }
      });

      dbRef.once("value").then(function(snap){
        var data = snap.val();
        if(!data || Object.keys(data).length === 0){
          seedIfEmpty();
        }
      }).catch(function(err){
        console.error("Firebase Lesefehler:", err);
        fallbackLocal();
      });

      dbRef.on("value", function(snap){
        state.verlage = snap.val() || {};
        renderApp();
      }, function(err){
        console.error("Firebase Listener-Fehler:", err);
        fallbackLocal();
      });

      dbRef2.once("value").then(function(snap){
        state.personen = snap.val() || {};
        renderApp();
      }).catch(function(err){
        console.error("Firebase Personen-Lesefehler:", err);
      });

      dbRef2.on("value", function(snap){
        state.personen = snap.val() || {};
        renderApp();
      }, function(err){
        console.error("Firebase Personen-Listener-Fehler:", err);
      });
    } catch(err){
      console.error("Firebase Initialisierung fehlgeschlagen:", err);
      fallbackLocal();
    }
  }

  function persist(id){
    clearTimeout(saveTimers[id]);
    saveTimers[id] = setTimeout(function(){
      if(usingFirebase && dbRef && state.verlage[id]){
        dbRef.child(id).set(state.verlage[id]).catch(function(err){
          console.error("Speicherfehler:", err);
          setSyncStatus("offline");
        });
      }
    }, 400);
  }

  function removeVerlagRemote(id){
    if(usingFirebase && dbRef){
      dbRef.child(id).remove().catch(function(err){ console.error(err); });
    }
  }

  function renderKPIs(){
    var el = document.getElementById("kpiRow");
    var all = Object.keys(state.verlage).map(function(id){ return state.verlage[id]; });
    var total = all.length;
    var counts = {pipeline:0, austausch:0, test:0, automatisiert:0};
    var overdueCount = 0;
    all.forEach(function(v){
      if(counts[v.status] !== undefined) counts[v.status]++;
      var ampel = getVerlagAmpel(v);
      if(ampel.level === "red") overdueCount++;
    });
    var pct = total > 0 ? Math.min(Math.round((counts.automatisiert / total) * 100), 100) : 0;
    var automatisiertPct = total > 0 ? Math.round((counts.automatisiert / total) * 100) : 0;
    el.innerHTML =
      '<div class="kpi-tile">' +
        '<div class="kpi-value">' + counts.automatisiert + ' / ' + total + '</div>' +
        '<div class="kpi-label">Verlage automatisiert (Ziel)</div>' +
        '<div class="progress-bar-outer"><div class="progress-bar-inner" style="width:' + pct + '%"></div></div>' +
      '</div>' +
      '<div class="kpi-tile kpi-accent">' +
        '<div class="kpi-value">' + counts.automatisiert + '</div>' +
        '<div class="kpi-label">Automatisiert (' + automatisiertPct + '% von gesamt)</div>' +
      '</div>' +
      '<div class="kpi-tile"><div class="kpi-value">' + total + '</div><div class="kpi-label">Aktuell erfasst</div></div>' +
      '<div class="kpi-tile"><div class="kpi-value">' + counts.pipeline + '</div><div class="kpi-label">in Pipeline</div></div>' +
      '<div class="kpi-tile"><div class="kpi-value">' + counts.austausch + '</div><div class="kpi-label">im Austausch</div></div>' +
      '<div class="kpi-tile"><div class="kpi-value">' + counts.test + '</div><div class="kpi-label">im Test</div></div>' +
      '<div class="kpi-tile ' + (overdueCount > 0 ? "kpi-alert" : "") + '"><div class="kpi-value">' + overdueCount + '</div><div class="kpi-label">überfällige Kontakte</div></div>';
  }

  function passesFilter(v){
    var s = state.filter.search.trim().toLowerCase();
    if(s){
      var hay = ((v.name||"") + " " + personName(v.kontaktVerlag) + " " + personName(v.zustaendigIntern)).toLowerCase();
      if(hay.indexOf(s) === -1) return false;
    }
    if(state.filter.status !== "all" && v.status !== state.filter.status) return false;
    if(state.filter.prioritaet !== "all" && v.prioritaet !== state.filter.prioritaet) return false;
    return true;
  }

    var lastContactDisplay;

      lastContactDisplay = formatDate(v.letzterKontakt);
    }
    var statuses = ["pipeline","austausch","test","automatisiert"];
    var options = statuses.map(function(st){
      return '<option value="' + st + '" ' + (v.status === st ? "selected" : "") + '>' + STATUS_LABELS[st] + '</option>';
    }).join("");

    return '' +
      '<div class="kanban-card" draggable="true" data-id="' + id + '">' +
        '<div class="card-top">' +
          '<span class="prio-badge prio-' + v.prioritaet + '">' + (PRIO_LABELS[v.prioritaet] || "–") + '</span>' +
          '<span class="ampel-dot ampel-' + ampel.level + '" title="' + esc(ampel.text) + '"></span>' +

  function renderBoard(){
    var statuses = ["pipeline","austausch","test","automatisiert"];
    statuses.forEach(function(st){
      var sortSelect = document.querySelector('.col-sort-select[data-status="' + st + '"]');
      if(sortSelect && sortSelect.dataset.built !== "1"){
        sortSelect.innerHTML = sortOptionsHtml(state.columnSort[st]);
        sortSelect.dataset.built = "1";
      } else if(sortSelect){
        sortSelect.value = state.columnSort[st];
      }
      var listEl = document.querySelector('.card-list[data-status="' + st + '"]');
      var countEl = document.querySelector('.column-count[data-status="' + st + '"]');
      if(!listEl) return;
      var entries = Object.keys(state.verlage).filter(function(id){
        var v = state.verlage[id];
        return v.status === st && passesFilter(v);
      });
      entries = sortVerlagIds(entries, state.columnSort[st]);
      if(countEl) countEl.textContent = entries.length;
      if(entries.length === 0){
        listEl.innerHTML = '<p class="empty-hint">' + (Object.keys(state.verlage).length === 0 ? 'Noch keine Verlage erfasst - lege den ersten Verlag an.' : 'Keine Verlage in dieser Spalte.') + '</p>';
        return;
      }
      listEl.innerHTML = entries.map(function(id){ return renderCard(id, state.verlage[id]); }).join("");
    });
  }

  function buildPersonOptions(selectedId){
    var list = Object.keys(state.personen).map(function(pid){
      var p = state.personen[pid];
      return {id: pid, vorname: p.vorname || "", nachname: p.nachname || ""};
    });
    list.sort(function(a,b){ return (a.nachname || "").localeCompare(b.nachname || ""); });
    var html = '<option value="">–</option>';
    html += list.map(function(p){
      return '<option value="' + p.id + '" ' + (selectedId === p.id ? "selected" : "") + '>' + esc((p.vorname + " " + p.nachname).trim()) + '</option>';
    }).join("");
    html += '<option value="__new__">+ Neue Person anlegen</option>';
    return html;

  function isTypingField(overlay){
    var el = document.activeElement;
    if(!overlay.contains(el)) return false;
    if(el.tagName === "TEXTAREA") return true;
    if(el.tagName === "INPUT" && el.type === "text") return true;
    return false;
  }

  function renderModal(force){
    var overlay = document.getElementById("modalOverlay");
    if(!state.selectedId || !state.verlage[state.selectedId]){
      overlay.classList.add("hidden");
      overlay.innerHTML = "";
      overlay.dataset.openId = "";
      return;
    }
    if(!force && overlay.dataset.openId === state.selectedId && isTypingField(overlay)){
      return;
    }
    overlay.dataset.openId = state.selectedId;
    var v = state.verlage[state.selectedId];
    overlay.innerHTML = renderModalHtml(state.selectedId, v);
    overlay.classList.remove("hidden");
  }

  function openModal(id){
    state.selectedId = id;
    document.getElementById("modalOverlay").dataset.openId = "";
    renderModal(true);

  function closeModal(){
    state.selectedId = null;
    var overlay = document.getElementById("modalOverlay");
    overlay.classList.add("hidden");
    overlay.innerHTML = "";
    overlay.dataset.openId = "";
  }

  function computeReminders(){
    var overdue = [];
    var soon = [];
    Object.keys(state.verlage).forEach(function(id){
      var v = state.verlage[id];
      var contacts = getEffectiveContacts(v);
      contacts.forEach(function(c){
        var wd = c.date ? workdaysSince(c.date) : null;
        var item = {verlagId:id, verlagName:v.name, label:c.label, date:c.date, isWebsite:c.isWebsite, wid:c.wid, workdays: wd};
        if(wd === null || wd >= 3){
          item.sortWd = (wd === null) ? 999 : wd;
          overdue.push(item);
        } else if(wd === 2){
          item.sortWd = wd;
          soon.push(item);
        }
      });
    });
    overdue.sort(function(a,b){ return b.sortWd - a.sortWd; });
    soon.sort(function(a,b){ return b.sortWd - a.sortWd; });
    return {overdue: overdue, soon: soon};
  }

  function computeOpenTodos(){
    var list = [];
    Object.keys(state.verlage).forEach(function(id){
      var v = state.verlage[id];
      (v.todos || []).forEach(function(t){
        if(!t.erledigt){
          list.push({id:t.id, text:t.text, faellig:t.faellig, verlagId:id, verlagName:v.name});
        }
      });
    });
    list.sort(function(a,b){ return (a.faellig || "9999").localeCompare(b.faellig || "9999"); });
    return list;
  }

  function renderGlobalTodo(t){
    var overdueTodo = t.faellig && t.faellig < todayISO();
    return '' +
      '<div class="todo-item ' + (overdueTodo ? "todo-overdue" : "") + '">' +

      '</div>';

  function renderReminder(){
    var el = document.getElementById("reminderView");
    var res = computeReminders();
    var todos = computeOpenTodos();
    var overdueHtml = res.overdue.length === 0
      ? '<p class="empty-hint">Keine überfälligen Kontakte 🎉</p>'
      : '<div class="reminder-list">' + res.overdue.map(renderReminderItem).join("") + '</div>';
    var soonHtml = res.soon.length === 0
      ? '<p class="empty-hint">Nichts aktuell bald fällig.</p>'
      : '<div class="reminder-list">' + res.soon.map(renderReminderItem).join("") + '</div>';
    var todosHtml = todos.length === 0
      ? '<p class="empty-hint">Keine offenen Todos.</p>'
      : '<div class="todo-list">' + todos.map(renderGlobalTodo).join("") + '</div>';

    el.innerHTML =
      '<div class="reminder-section"><h2>🔴 Überfällige Kontakte (≥ 3 Werktage ohne Kontakt)</h2>' + overdueHtml + '</div>' +
      '<div class="reminder-section"><h2>🟡 Bald fällig (2 Werktage seit Kontakt)</h2>' + soonHtml + '</div>' +
      '<div class="reminder-section"><h2>📝 Offene Todos</h2>' + todosHtml + '</div>';
  }

  var DETAIL_COLUMNS = [
    {key:"name", label:"Verlag"},
    {key:"prioritaet", label:"Priorität"},
    {key:"wichtigkeitProzent", label:"Wichtigkeit %"},
    {key:"status", label:"Status"},
    {key:"kontaktVerlag", label:"Kontaktperson"},
    {key:"websites", label:"Websites"},
    {key:"letzterKontakt", label:"Letzter Kontakt"}
  ];

  function detailSortIds(ids){
    var key = state.detailSort.key;
    var dir = state.detailSort.dir === "asc" ? 1 : -1;
    var arr = ids.slice();
    function v(id){ return state.verlage[id]; }
    arr.sort(function(a,b){
      var A, B;
      switch(key){
        case "prioritaet": A = PRIO_RANK[v(a).prioritaet]||0; B = PRIO_RANK[v(b).prioritaet]||0; break;
        case "wichtigkeitProzent": A = numOrNeg(v(a).wichtigkeitProzent); B = numOrNeg(v(b).wichtigkeitProzent); break;
        case "status": A = v(a).status||""; B = v(b).status||""; break;
        case "kontaktVerlag": A = personName(v(a).kontaktVerlag).toLowerCase(); B = personName(v(b).kontaktVerlag).toLowerCase(); break;
        case "websites": A = websiteCount(v(a)); B = websiteCount(v(b)); break;
        case "letzterKontakt": A = getOldestContactDate(v(a))||""; B = getOldestContactDate(v(b))||""; break;
        default: A = (v(a).name||"").toLowerCase(); B = (v(b).name||"").toLowerCase();
      }
      if(A < B) return -1*dir;
      if(A > B) return 1*dir;
      return 0;
    });
    return arr;
  }

  function renderDetailWebsiteBlock(w){
    var kanaeleHtml = Object.keys(w.kanaele || {}).map(function(kid){
      var k = w.kanaele[kid];
      var typen = k.typen || (k.typ ? [k.typ] : []);
      var typLabel = typen.length ? typen.join(" + ") : "–";
      return '<span class="kanal-badge"><b>' + esc(typLabel) + '</b> · ' + esc(k.format) + '</span>';
    }).join("");
    return '' +
      '<div class="detail-website-block' + (kanaeleHtml ? ' has-kanaele' : '') + '">' +
        '<div class="detail-website-title">🌐 ' + esc(w.name) + (w.letzterKontakt ? ' <span style="color:var(--muted);font-weight:400;font-size:0.78rem;">· letzter Kontakt: ' + formatDate(w.letzterKontakt) + '</span>' : '') + '</div>' +
        (kanaeleHtml ? '<div class="detail-kanal-badges">' + kanaeleHtml + '</div>' : '') +
      '</div>';
  }

  function renderDetailRow(id){
    var v = state.verlage[id];
    var expanded = !!state.detailExpanded[id];
    var websites = Object.keys(v.websites || {}).map(function(wid){ return v.websites[wid]; });
    var expandRow = expanded ? (
      '<tr class="detail-expand-row" data-id="' + id + '">' +
        '<td colspan="' + DETAIL_COLUMNS.length + '">' +
          (websites.length === 0 ? '<p class="empty-hint">Keine Websites erfasst.</p>' : websites.map(renderDetailWebsiteBlock).join("")) +
        '</td>' +
      '</tr>'
    ) : "";
    return '' +
      '<tr class="verlag-row" data-id="' + id + '">' +
        '<td><span class="expand-arrow ' + (expanded ? "open" : "") + '">▶</span>' + esc(v.name) + '</td>' +
        '<td><span class="prio-badge prio-' + v.prioritaet + '">' + (PRIO_LABELS[v.prioritaet] || "–") + '</span></td>' +
        '<td>' + (v.wichtigkeitProzent !== undefined && v.wichtigkeitProzent !== null && v.wichtigkeitProzent !== "" ? Number(v.wichtigkeitProzent).toFixed(2) + " %" : "–") + '</td>' +
        '<td><span class="status-badge status-' + v.status + '">' + (STATUS_LABELS[v.status] || "–") + '</span></td>' +
        '<td>' + esc(personName(v.kontaktVerlag)) + '</td>' +
        '<td>' + websiteCount(v) + '</td>' +
        '<td>' + formatDate(getOldestContactDate(v)) + '</td>' +
      '</tr>' + expandRow;
  }

  function renderDetail(){
    var el = document.getElementById("detailView");
    var ids = Object.keys(state.verlage).filter(function(id){
      return passesFilter(state.verlage[id]);
    });
    ids = detailSortIds(ids);
    var headHtml = DETAIL_COLUMNS.map(function(col){
      var sorted = state.detailSort.key === col.key;
      var arrow = sorted ? (state.detailSort.dir === "asc" ? " ▲" : " ▼") : "";
      return '<th class="' + (sorted ? "sorted" : "") + '" data-key="' + col.key + '">' + col.label + arrow + '</th>';
    }).join("");
    var bodyHtml = ids.length === 0
      ? '<tr><td colspan="' + DETAIL_COLUMNS.length + '" class="empty-hint">Keine Verlage erfasst.</td></tr>'
      : ids.map(renderDetailRow).join("");
    el.innerHTML =
      '<div class="detail-wrap">' +
        '<table class="detail-table">' +
          '<thead><tr>' + headHtml + '</tr></thead>' +
          '<tbody>' + bodyHtml + '</tbody>' +
        '</table>' +
      '</div>';
  }

  function renderApp(){
    renderKPIs();
    renderBoard();
    if(state.currentTab === "reminder") renderReminder();
    if(state.currentTab === "detail") renderDetail();
    renderModal();
  }

  document.querySelectorAll(".tab-btn").forEach(function(btn){
    btn.addEventListener("click", function(){
      document.querySelectorAll(".tab-btn").forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");
      state.currentTab = btn.dataset.tab;
      document.getElementById("kanbanView").classList.toggle("hidden", state.currentTab !== "kanban");
      document.getElementById("reminderView").classList.toggle("hidden", state.currentTab !== "reminder");
      document.getElementById("detailView").classList.toggle("hidden", state.currentTab !== "detail");
      document.getElementById("kanbanToolbar").classList.toggle("hidden", state.currentTab === "reminder");
      renderApp();
    });
  });

  document.getElementById("searchInput").addEventListener("input", function(e){
    state.filter.search = e.target.value;
    renderBoard();
    if(state.currentTab === "detail") renderDetail();
  });
  document.getElementById("filterStatus").addEventListener("change", function(e){
    state.filter.status = e.target.value;
    renderBoard();
    if(state.currentTab === "detail") renderDetail();
  });
  document.getElementById("filterPrio").addEventListener("change", function(e){
    state.filter.prioritaet = e.target.value;
    renderBoard();
    if(state.currentTab === "detail") renderDetail();
  });

  document.getElementById("addVerlagBtn").addEventListener("click", function(){
    document.getElementById("addVerlagForm").classList.remove("hidden");
    document.getElementById("newVerlagName").focus();
  });
  document.getElementById("cancelAddVerlag").addEventListener("click", function(){
    document.getElementById("addVerlagForm").classList.add("hidden");
    document.getElementById("newVerlagName").value = "";
  });
  function submitNewVerlag(){
    var nameInput = document.getElementById("newVerlagName");
    var name = nameInput.value.trim();
    if(!name) return;
    var id = uid("v");
    state.verlage[id] = {
      name: name,
      kontaktVerlag: "",
      zustaendigIntern: "",
      prioritaet: "mittel",
      status: "pipeline",
      letzterKontakt: todayISO(),
      websitesUnabhaengig: false,
      notizen: "",
      todos: [],
      websites: {}
    };
    nameInput.value = "";
    document.getElementById("addVerlagForm").classList.add("hidden");
    renderApp();
    persist(id);
    openModal(id);
  }
  document.getElementById("confirmAddVerlag").addEventListener("click", submitNewVerlag);
  document.getElementById("newVerlagName").addEventListener("keydown", function(e){
    if(e.key === "Enter") submitNewVerlag();
  });

  document.getElementById("resetWebsitesBtn").addEventListener("click", function(){
    var ok = window.confirm("Fehlende Website-Namen aus den Stammdaten ergänzen? Bereits vorhandene Websites und Kanäle bleiben unverändert.");
    if(ok){
      restoreWebsitesFromSeed();
    }
  });

  var kanbanView = document.getElementById("kanbanView");

  kanbanView.addEventListener("dragstart", function(e){
    var card = e.target.closest(".kanban-card");
    if(card){
      state.draggingId = card.dataset.id;
      e.dataTransfer.effectAllowed = "move";
      card.classList.add("dragging");
    }
  });
  kanbanView.addEventListener("dragend", function(e){
    var card = e.target.closest(".kanban-card");
    if(card) card.classList.remove("dragging");
    state.draggingId = null;
  });
  kanbanView.addEventListener("dragover", function(e){
    var list = e.target.closest(".card-list");
    if(list){
      e.preventDefault();
      list.classList.add("drag-over");
    }
  });
  kanbanView.addEventListener("dragleave", function(e){
    var list = e.target.closest(".card-list");
    if(list) list.classList.remove("drag-over");
  });
  kanbanView.addEventListener("drop", function(e){
    var list = e.target.closest(".card-list");
    if(list){
      e.preventDefault();
      list.classList.remove("drag-over");
      if(state.draggingId){
        changeStatus(state.draggingId, list.dataset.status);
        state.draggingId = null;
      }
    }
  });
  kanbanView.addEventListener("change", function(e){
    var select = e.target.closest(".status-select");
    if(select){
      var card = select.closest(".kanban-card");
      changeStatus(card.dataset.id, select.value);
      return;
    }
    var sortSelect = e.target.closest(".col-sort-select");
    if(sortSelect){
      var st = sortSelect.dataset.status;
      state.columnSort[st] = sortSelect.value;
      renderBoard();
    }
  });
  kanbanView.addEventListener("click", function(e){
    if(e.target.closest(".no-card-click")) return;
    var card = e.target.closest(".kanban-card");
    if(card) openModal(card.dataset.id);
  });

  var detailView = document.getElementById("detailView");
  detailView.addEventListener("click", function(e){
    var th = e.target.closest("th[data-key]");
    if(th){
      var key = th.dataset.key;
      if(state.detailSort.key === key){
        state.detailSort.dir = state.detailSort.dir === "asc" ? "desc" : "asc";
      } else {
        state.detailSort.key = key;
        state.detailSort.dir = "asc";
      }
      renderDetail();
      return;
    }
    var row = e.target.closest("tr.verlag-row");
    if(row){
      var id = row.dataset.id;
      state.detailExpanded[id] = !state.detailExpanded[id];
      renderDetail();
    }
  });

  var modalOverlay = document.getElementById("modalOverlay");

  function createPerson(vorname, nachname, email){
    var pid;
    if(usingFirebase && dbRef2){
      var newRef = dbRef2.push();
      pid = newRef.key;
      newRef.set({vorname: vorname, nachname: nachname, email: email || ""}).catch(function(err){ console.error("Person anlegen fehlgeschlagen:", err); });
      state.personen[pid] = {vorname: vorname, nachname: nachname, email: email || ""};
    } else {
      pid = uid("p");
      state.personen[pid] = {vorname: vorname, nachname: nachname, email: email || ""};
    }
    return pid;
  }

  modalOverlay.addEventListener("click", function(e){
    if(e.target.id === "modalOverlay"){
      closeModal();
      return;
    }
    var btn = e.target.closest("[data-action]");
    if(!btn) return;
    var action = btn.dataset.action;

    if(action === "close-modal"){ closeModal(); return; }

    var id = state.selectedId;
    if(!id || !state.verlage[id]) return;
    var v = state.verlage[id];
    var wid = btn.dataset.wid;
    var kid = btn.dataset.kid;
    var tid = btn.dataset.tid;

    if(action === "delete-verlag"){
      delete state.verlage[id];
      state.selectedId = null;
      removeVerlagRemote(id);
      renderApp();
      return;
    } else if(action === "toggle-override"){
      v.websitesUnabhaengig = !v.websitesUnabhaengig;
    } else if(action === "add-website"){
      var newWid = uid("w");
      if(!v.websites) v.websites = {};
      v.websites[newWid] = {name: "Neue Website", letzterKontakt: todayISO(), kanaele: {}};
    } else if(action === "remove-website"){
      if(v.websites) delete v.websites[wid];
    } else if(action === "add-kanal"){
      if(!v.websites || !v.websites[wid]) return;
      if(!v.websites[wid].kanaele) v.websites[wid].kanaele = {};
      var newKid = uid("k");
      v.websites[wid].kanaele[newKid] = {typen: ["Mailing"], format: "XLS", beispielLink: ""};
    } else if(action === "remove-kanal"){
      if(v.websites && v.websites[wid] && v.websites[wid].kanaele) delete v.websites[wid].kanaele[kid];
    } else if(action === "add-gemeinsam-kanal"){
      if(!v.gemeinsameKanaele) v.gemeinsameKanaele = {};
      var newGkid = uid("k");
      v.gemeinsameKanaele[newGkid] = {typen: ["Mailing"], format: "XLS", beispielLink: ""};
    } else if(action === "remove-gemeinsam-kanal"){
      if(v.gemeinsameKanaele) delete v.gemeinsameKanaele[kid];
    } else if(action === "toggle-todo"){
      var t1 = (v.todos || []).find(function(t){ return t.id === tid; });
      if(t1) t1.erledigt = !t1.erledigt;
    } else if(action === "delete-todo"){
      v.todos = (v.todos || []).filter(function(t){ return t.id !== tid; });
    } else if(action === "add-todo"){
      var textInput = document.getElementById("newTodoText");
      var dateInput = document.getElementById("newTodoDate");
      var text = textInput.value.trim();
      if(!text) return;
      if(!v.todos) v.todos = [];
      v.todos.push({id: uid("t"), text: text, faellig: dateInput.value || "", erledigt:false});
    } else if(action === "create-person"){
      var forField = btn.dataset.for;
      var wrap = btn.closest(".new-person-form");
      if(!wrap) return;
      var vornameEl = wrap.querySelector('[data-newperson="vorname"]');
      var nachnameEl = wrap.querySelector('[data-newperson="nachname"]');
      var emailEl = wrap.querySelector('[data-newperson="email"]');
      var vorname = vornameEl.value.trim();
      var nachname = nachnameEl.value.trim();
      var email = emailEl.value.trim();
      if(!vorname || !nachname) return;
      var pid = createPerson(vorname, nachname, email);
      if(forField === "kontaktVerlag") v.kontaktVerlag = pid;
      else if(forField === "zustaendigIntern") v.zustaendigIntern = pid;
      renderApp();
      persist(id);
      return;
    } else {
      return;
    }

    renderApp();
    persist(id);
  });

  modalOverlay.addEventListener("input", function(e){
    var field = e.target.dataset.field;
    if(!field) return;
    var id = state.selectedId;
    if(!id || !state.verlage[id]) return;
    var v = state.verlage[id];
    var wid = e.target.dataset.wid;
    var kid = e.target.dataset.kid;

    if(field === "name") v.name = e.target.value;
    else if(field === "notizen") v.notizen = e.target.value;
    else if(field === "website-name"){ if(v.websites && v.websites[wid]) v.websites[wid].name = e.target.value; }
    else if(field === "kanal-link"){ if(v.websites && v.websites[wid] && v.websites[wid].kanaele[kid]) v.websites[wid].kanaele[kid].beispielLink = e.target.value; }
    else if(field === "gemeinsam-kanal-link"){ if(v.gemeinsameKanaele && v.gemeinsameKanaele[kid]) v.gemeinsameKanaele[kid].beispielLink = e.target.value; }
    else return;

    renderApp();
    persist(id);
  });

  modalOverlay.addEventListener("change", function(e){
    var field = e.target.dataset.field;
    if(!field) return;
    var id = state.selectedId;
    if(!id || !state.verlage[id]) return;
    var v = state.verlage[id];
    var wid = e.target.dataset.wid;
    var kid = e.target.dataset.kid;

    if(field === "kontaktVerlag" || field === "zustaendigIntern"){
      if(e.target.value === "__new__"){
        var formWrap = e.target.closest(".field-row").querySelector('.new-person-form[data-for="' + field + '"]');
        if(formWrap){
          formWrap.classList.remove("hidden");
          var vornameInput = formWrap.querySelector('[data-newperson="vorname"]');
          if(vornameInput) vornameInput.focus();
        }
        return;
      }
      v[field] = e.target.value;
    }
    else if(field === "prioritaet") v.prioritaet = e.target.value;
    else if(field === "status") v.status = e.target.value;
    else if(field === "letzterKontakt") v.letzterKontakt = e.target.value;
    else if(field === "website-date"){ if(v.websites && v.websites[wid]) v.websites[wid].letzterKontakt = e.target.value; }
    else if(field === "kanal-format"){ if(v.websites && v.websites[wid] && v.websites[wid].kanaele[kid]) v.websites[wid].kanaele[kid].format = e.target.value; }
    else if(field === "gemeinsam-kanal-format"){ if(v.gemeinsameKanaele && v.gemeinsameKanaele[kid]) v.gemeinsameKanaele[kid].format = e.target.value; }
    else if(field === "kanal-typ-check"){
      if(v.websites && v.websites[wid] && v.websites[wid].kanaele[kid]){
        var kObj = v.websites[wid].kanaele[kid];
        if(!kObj.typen) kObj.typen = kObj.typ ? [kObj.typ] : [];
        var typVal = e.target.dataset.typ;
        var idx = kObj.typen.indexOf(typVal);
        if(e.target.checked){
          if(idx === -1) kObj.typen.push(typVal);
        } else {
          if(idx !== -1) kObj.typen.splice(idx, 1);
        }
      }
    }
    else if(field === "gemeinsam-kanal-typ-check"){
      if(v.gemeinsameKanaele && v.gemeinsameKanaele[kid]){
        var gkObj = v.gemeinsameKanaele[kid];
        if(!gkObj.typen) gkObj.typen = gkObj.typ ? [gkObj.typ] : [];
        var typVal2 = e.target.dataset.typ;
        var idx2 = gkObj.typen.indexOf(typVal2);
        if(e.target.checked){
          if(idx2 === -1) gkObj.typen.push(typVal2);
        } else {
          if(idx2 !== -1) gkObj.typen.splice(idx2, 1);
        }
      }
    }
    else return;

    renderApp();
    persist(id);
  });

  document.addEventListener("keydown", function(e){
    if(e.key === "Escape" && state.selectedId) closeModal();
  });

  document.getElementById("reminderView").addEventListener("click", function(e){
    var btn = e.target.closest("[data-action]");
    if(!btn) return;
    var action = btn.dataset.action;
    var id = btn.dataset.id;
    var v = state.verlage[id];
    if(!v) return;

    if(action === "quick-contact"){
      var wid = btn.dataset.wid;
      if(wid && v.websites && v.websites[wid]){
        v.websites[wid].letzterKontakt = todayISO();
      } else {
        v.letzterKontakt = todayISO();
      }
      renderApp();
      persist(id);
    } else if(action === "toggle-todo-global"){
      var tid = btn.dataset.tid;
      var t = (v.todos || []).find(function(tt){ return tt.id === tid; });
      if(t) t.erledigt = true;
      renderApp();
      persist(id);
    }
  });

  setSyncStatus("connecting");
  renderApp();
  initFirebase();

})();
</script>
</body>
</html>
