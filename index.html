<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Verlags-Standardisierung Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/firebase@10.12.2/firebase-app-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@10.12.2/firebase-database-compat.js"></script>
<style>
  :root{
    --bg:#f2f4f8;
    --card-bg:#ffffff;
    --text:#1f2733;
    --muted:#6b7688;
    --border:#e1e5eb;
    --accent:#3a5ded;
    --accent-dark:#2c46c4;
    --red:#e74c3c;
    --yellow:#f2a93b;
    --green:#27ae60;
    --grey:#9aa4b2;
    --radius:12px;
    --shadow:0 2px 8px rgba(20,30,60,0.08);
    --shadow-hover:0 6px 18px rgba(20,30,60,0.16);
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);}
  .hidden{display:none !important;}
  header.topbar{
    position:sticky;top:0;z-index:50;background:linear-gradient(135deg,#1f2b52,#2c46c4);
    color:#fff;padding:14px 20px 0 20px;box-shadow:0 3px 10px rgba(0,0,0,0.15);
  }
  .topbar-row1{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
  .topbar-row1 h1{font-size:1.25rem;margin:0 0 8px 0;font-weight:600;}
  .sync-indicator{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.12);padding:6px 12px;border-radius:20px;font-size:0.85rem;margin-bottom:8px;}
  .sync-dot{width:10px;height:10px;border-radius:50%;background:var(--grey);flex-shrink:0;}
  .sync-dot.connected{background:var(--green);}
  .sync-dot.connecting{background:var(--yellow);animation:pulse 1s infinite;}
  .sync-dot.offline{background:var(--red);}
  @keyframes pulse{0%{opacity:1;}50%{opacity:0.3;}100%{opacity:1;}}
  .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:10px 0 12px 0;}
  .kpi-tile{background:rgba(255,255,255,0.1);border-radius:10px;padding:10px 12px;}
  .kpi-tile .kpi-value{font-size:1.3rem;font-weight:700;}
  .kpi-tile .kpi-label{font-size:0.78rem;color:#dfe4f5;margin-top:2px;}
  .kpi-tile.kpi-alert{background:rgba(231,76,60,0.35);}
  .progress-bar-outer{width:100%;height:6px;background:rgba(255,255,255,0.25);border-radius:4px;margin-top:6px;overflow:hidden;}
  .progress-bar-inner{height:100%;background:#4ade80;border-radius:4px;transition:width .3s;}
  .tabs{display:flex;gap:6px;padding-top:4px;}
  .tab-btn{background:rgba(255,255,255,0.08);border:none;color:#dfe4f5;padding:9px 18px;border-radius:8px 8px 0 0;cursor:pointer;font-size:0.9rem;}
  .tab-btn.active{background:var(--bg);color:var(--text);font-weight:600;}
  .toolbar{background:var(--bg);display:flex;gap:10px;flex-wrap:wrap;padding:12px 20px;align-items:center;}
  .toolbar input[type="text"], .toolbar select{
    padding:8px 10px;border-radius:8px;border:1px solid var(--border);font-size:0.9rem;background:#fff;
  }
  #searchInput{flex:1;min-width:180px;}
  #addVerlagBtn{background:var(--accent);color:#fff;border:none;padding:9px 16px;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.9rem;}
  #addVerlagBtn:hover{background:var(--accent-dark);}
  .add-form{background:#fff;margin:0 20px 12px 20px;padding:12px;border-radius:10px;display:flex;gap:8px;flex-wrap:wrap;box-shadow:var(--shadow);}
  .add-form input{flex:1;min-width:180px;padding:8px 10px;border-radius:8px;border:1px solid var(--border);}
  .add-form button{padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-weight:600;}
  #confirmAddVerlag{background:var(--green);color:#fff;}
  #cancelAddVerlag{background:#eee;color:#333;}
  main#mainContent{padding:0 20px 30px 20px;}
  .board{display:flex;gap:16px;overflow-x:auto;padding:6px 0 16px 0;align-items:flex-start;}
  .board-column{background:#e9ecf3;border-radius:var(--radius);min-width:290px;max-width:320px;flex:1 0 290px;display:flex;flex-direction:column;max-height:calc(100vh - 230px);}
  .column-header{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;font-weight:700;font-size:0.95rem;border-bottom:2px solid #d7dbe6;}
  .column-count{background:#fff;border-radius:12px;padding:2px 9px;font-size:0.8rem;color:var(--muted);}
  .card-list{padding:10px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;flex:1;min-height:60px;}
  .card-list.drag-over{background:#dbe2fb;}
  .kanban-card{background:var(--card-bg);border-radius:10px;padding:12px;box-shadow:var(--shadow);cursor:pointer;border:1px solid var(--border);transition:box-shadow .15s,transform .15s;}
  .kanban-card:hover{box-shadow:var(--shadow-hover);transform:translateY(-1px);}
  .kanban-card.dragging{opacity:0.4;}
  .card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .prio-badge{font-size:0.72rem;font-weight:700;padding:3px 9px;border-radius:12px;color:#fff;text-transform:uppercase;letter-spacing:.3px;}
  .prio-hoch{background:var(--red);}
  .prio-mittel{background:var(--yellow);color:#4a3200;}
  .prio-niedrig{background:var(--green);}
  .ampel-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 2px #fff, 0 0 0 3px rgba(0,0,0,0.06);}
  .ampel-green{background:var(--green);}
  .ampel-yellow{background:var(--yellow);}
  .ampel-red{background:var(--red);}
  .ampel-grey{background:var(--grey);}
  .card-title{margin:2px 0 8px 0;font-size:1rem;font-weight:700;}
  .card-meta{font-size:0.82rem;color:var(--muted);display:flex;flex-direction:column;gap:3px;margin-bottom:10px;}
  .meta-label{color:#8590a3;}
  .card-footer{border-top:1px dashed var(--border);padding-top:8px;}
  .status-select{width:100%;padding:6px 8px;border-radius:6px;border:1px solid var(--border);font-size:0.82rem;background:#f9fafc;}
  .empty-hint{color:var(--muted);font-size:0.85rem;padding:8px;text-align:center;}
  footer{text-align:center;color:var(--muted);font-size:0.8rem;padding:16px;border-top:1px solid var(--border);background:#fff;}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(15,20,35,0.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
  .modal-panel{background:#fff;border-radius:14px;width:720px;max-width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
  .modal-header{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:5;}
  .verlag-name-input{font-size:1.1rem;font-weight:700;border:none;border-bottom:2px solid transparent;flex:1;padding:4px 2px;}
  .verlag-name-input:focus{outline:none;border-bottom:2px solid var(--accent);}
  .btn-icon{background:none;border:none;font-size:1.1rem;cursor:pointer;padding:4px 8px;border-radius:6px;}
  .btn-icon:hover{background:#f0f2f7;}
  .close-btn{font-size:1.3rem;color:var(--muted);}
  .modal-body{padding:16px 20px 24px 20px;}
  .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
  .field-row{display:flex;flex-direction:column;gap:4px;}
  .field-row.small{margin:8px 0;}
  .field-row label{font-size:0.78rem;color:var(--muted);font-weight:600;}
  .field-row input, .field-row select{padding:8px 10px;border-radius:8px;border:1px solid var(--border);font-size:0.9rem;}
  .section{margin-bottom:22px;}
  .section h3{margin:0 0 10px 0;font-size:1rem;border-left:4px solid var(--accent);padding-left:8px;}
  .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .section-header.small{margin:10px 0 6px 0;}
  .section-header h3{margin:0;}
  .btn-small{background:var(--accent);color:#fff;border:none;padding:6px 12px;border-radius:7px;font-size:0.8rem;cursor:pointer;font-weight:600;}
  .btn-small:hover{background:var(--accent-dark);}
  .btn-danger{background:var(--red);color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:600;}
  .override-toggle{background:#f4f6fb;padding:10px 12px;border-radius:8px;margin-bottom:10px;font-size:0.85rem;}
  .override-toggle label{display:flex;align-items:center;gap:8px;cursor:pointer;}
  .website-list{display:flex;flex-direction:column;gap:12px;}
  .website-card{background:#f7f8fb;border:1px solid var(--border);border-radius:10px;padding:12px;}
  .website-header{display:flex;gap:8px;align-items:center;margin-bottom:6px;}
  .website-name-input{flex:1;padding:6px 8px;border-radius:6px;border:1px solid var(--border);font-weight:600;}
  .kanal-list{margin-top:6px;}
  .kanal-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap;}
  .kanal-row select{padding:5px 6px;border-radius:6px;border:1px solid var(--border);font-size:0.8rem;}
  .kanal-row input[type="text"]{flex:1;min-width:140px;padding:5px 8px;border-radius:6px;border:1px solid var(--border);font-size:0.8rem;}
  textarea{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);font-family:inherit;font-size:0.9rem;resize:vertical;}
  .todo-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
  .todo-item{display:flex;align-items:center;gap:8px;background:#f7f8fb;padding:7px 10px;border-radius:8px;font-size:0.85rem;}
  .todo-item.done .todo-text{text-decoration:line-through;color:var(--muted);}
  .todo-item.todo-overdue{background:#fdeceb;}
  .todo-text{flex:1;}
  .todo-date{color:var(--muted);font-size:0.78rem;}
  .add-todo-row{display:flex;gap:6px;flex-wrap:wrap;}
  .add-todo-row input[type="text"]{flex:1;min-width:150px;padding:7px 9px;border-radius:7px;border:1px solid var(--border);}
  .add-todo-row input[type="date"]{padding:7px 9px;border-radius:7px;border:1px solid var(--border);}
  .modal-footer{border-top:1px solid var(--border);padding-top:14px;text-align:right;}

  /* Reminder */
  .reminder-view{display:flex;flex-direction:column;gap:22px;padding-top:10px;}
  .reminder-section{background:#fff;border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);}
  .reminder-section h2{font-size:1.05rem;margin:0 0 12px 0;}
  .reminder-list{display:flex;flex-direction:column;gap:8px;}
  .reminder-item{display:flex;justify-content:space-between;align-items:center;gap:10px;background:#f7f8fb;padding:10px 12px;border-radius:9px;flex-wrap:wrap;}
  .reminder-sub{color:var(--muted);font-size:0.8rem;margin-top:2px;}

  @media (max-width:700px){
    .field-grid{grid-template-columns:1fr;}
    .board-column{min-width:82vw;max-width:82vw;}
    .kpi-row{grid-template-columns:repeat(2,1fr);}
    .modal-panel{width:100%;}
    .topbar-row1 h1{font-size:1.05rem;}
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-row1">
    <h1>📚 Verlags-Standardisierung Dashboard</h1>
    <div class="sync-indicator"><span class="sync-dot connecting" id="syncDot"></span><span id="syncText">Verbinde...</span></div>
  </div>
  <div class="kpi-row" id="kpiRow"></div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="kanban">Kanban-Board</button>
    <button class="tab-btn" data-tab="reminder">🔔 Reminder</button>
  </div>
</header>

<div class="toolbar" id="kanbanToolbar">
  <input id="searchInput" type="text" placeholder="🔍 Verlag, Kontakt suchen...">
  <select id="filterStatus">
    <option value="all">Alle Status</option>
    <option value="pipeline">Pipeline</option>
    <option value="austausch">Austausch</option>
    <option value="test">Test</option>
    <option value="automatisiert">Automatisiert</option>
  </select>
  <select id="filterPrio">
    <option value="all">Alle Prioritäten</option>
    <option value="hoch">Hoch</option>
    <option value="mittel">Mittel</option>
    <option value="niedrig">Niedrig</option>
  </select>
  <button id="addVerlagBtn">+ Neuer Verlag</button>
</div>
<div class="add-form hidden" id="addVerlagForm">
  <input type="text" id="newVerlagName" placeholder="Name des neuen Verlags...">
  <button id="confirmAddVerlag">Anlegen</button>
  <button id="cancelAddVerlag">Abbrechen</button>
</div>

<main id="mainContent">
  <section id="kanbanView" class="board">
    <div class="board-column" data-status="pipeline">
      <div class="column-header"><span>📋 Pipeline</span><span class="column-count" data-status="pipeline">0</span></div>
      <div class="card-list" data-status="pipeline"></div>
    </div>
    <div class="board-column" data-status="austausch">
      <div class="column-header"><span>🔄 Austausch</span><span class="column-count" data-status="austausch">0</span></div>
      <div class="card-list" data-status="austausch"></div>
    </div>
    <div class="board-column" data-status="test">
      <div class="column-header"><span>🧪 Test</span><span class="column-count" data-status="test">0</span></div>
      <div class="card-list" data-status="test"></div>
    </div>
    <div class="board-column" data-status="automatisiert">
      <div class="column-header"><span>✅ Automatisiert</span><span class="column-count" data-status="automatisiert">0</span></div>
      <div class="card-list" data-status="automatisiert"></div>
    </div>
  </section>

  <section id="reminderView" class="reminder-view hidden"></section>
</main>

<div id="modalOverlay" class="modal-overlay hidden"></div>

<footer>
  ⚠️ Testmodus / Demo-Daten, echte Verlagsdaten werden im nächsten Schritt eingepflegt.
</footer>

  /* ================= Helpers ================= */
  function uid(prefix){
    return (prefix||"id") + "_" + Date.now().toString(36) + Math.random().toString(36).slice(2,9);
  }
  function todayISO(){
    return new Date().toISOString().slice(0,10);
  }
  function daysAgoISO(n){
    var d = new Date();
    d.setDate(d.getDate()-n);
    return d.toISOString().slice(0,10);
  }
  function esc(str){
    if(str === undefined || str === null) return "";
    return String(str).replace(/[&<>"']/g, function(s){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[s];
    });
  }
  function formatDate(iso){
    if(!iso) return "–";
    var parts = iso.split("-");
    if(parts.length !== 3) return iso;
    return parts[2] + "." + parts[1] + "." + parts[0];
  }
  function workdaysSince(dateStr){
    if(!dateStr) return null;
    var start = new Date(dateStr + "T00:00:00");
    if(isNaN(start.getTime())) return null;
    var end = new Date();
    end.setHours(0,0,0,0);
    start.setHours(0,0,0,0);
    if(start >= end) return 0;
    var count = 0;
    var cur = new Date(start);
    cur.setDate(cur.getDate()+1);
    while(cur <= end){
      var day = cur.getDay();
      if(day !== 0 && day !== 6) count++;
      cur.setDate(cur.getDate()+1);
    }
    return count;
  }
  function ampelInfo(dateStr){
    if(!dateStr) return {level:"grey", workdays:null, text:"Kein Kontaktdatum erfasst"};
    var wd = workdaysSince(dateStr);
    if(wd >= 3) return {level:"red", workdays:wd, text: wd + " Werktage seit letztem Kontakt – überfällig"};
    if(wd === 2) return {level:"yellow", workdays:wd, text: wd + " Werktage seit letztem Kontakt – bald fällig"};
    return {level:"green", workdays:wd, text: wd + " Werktag(e) seit letztem Kontakt"};
  }
  function getEffectiveContacts(v){
    if(v.websitesUnabhaengig && v.websites && Object.keys(v.websites).length > 0){
      return Object.keys(v.websites).map(function(wid){
        var w = v.websites[wid];
        return {label: w.name, date: w.letzterKontakt || null, isWebsite:true, wid: wid};
      });
    }
    return [{label: v.name, date: v.letzterKontakt || null, isWebsite:false, wid:null}];
  }
  function getVerlagAmpel(v){
    var contacts = getEffectiveContacts(v);
    var rank = {grey:3, red:2, yellow:1, green:0};
    var worst = null;
    contacts.forEach(function(c){
      var info = ampelInfo(c.date);
      if(!worst || rank[info.level] > rank[worst.level]) worst = info;
    });
    return worst || {level:"grey", workdays:null, text:"Kein Datum"};
  }

  /* ================= Firebase Anbindung ================= */
  function setSyncStatus(status){
    var dot = document.getElementById("syncDot");
    var text = document.getElementById("syncText");
    dot.className = "sync-dot " + status;
    if(status === "connected") text.textContent = "Verbunden (Live-Sync)";
    else if(status === "connecting") text.textContent = "Verbinde...";
    else text.textContent = "Offline (lokaler Modus)";
  }

  function fallbackLocal(){
    if(Object.keys(state.verlage).length === 0){
      state.verlage = buildDemoData();
      renderApp();
    }
  }

  function initFirebase(){
    if(typeof firebase === "undefined"){
      console.warn("Firebase SDK nicht verfügbar - lokaler Fallback aktiv.");
      setSyncStatus("offline");
      fallbackLocal();
      return;
    }
    try {
      firebase.initializeApp(firebaseConfig);
      var db = firebase.database();
      dbRef = db.ref("verlage");
      usingFirebase = true;

      db.ref(".info/connected").on("value", function(snap){
        if(snap.val() === true){ setSyncStatus("connected"); }
        else { setSyncStatus("connecting"); }
      });

      dbRef.once("value").then(function(snap){
        if(!snap.exists()){
          var demo = buildDemoData();
          dbRef.set(demo);
        }
      }).catch(function(err){
        console.error("Firebase Lesefehler:", err);
        setSyncStatus("offline");
        fallbackLocal();
      });

      dbRef.on("value", function(snap){
        state.verlage = snap.val() || {};
        renderApp();
      }, function(err){
        console.error("Firebase Listener-Fehler:", err);
        setSyncStatus("offline");
        fallbackLocal();
      });
    } catch(err){
      console.error("Firebase Initialisierung fehlgeschlagen:", err);
      setSyncStatus("offline");
      fallbackLocal();
    }
    setTimeout(function(){ fallbackLocal(); }, 4000);
  }

  function persist(id){
    clearTimeout(saveTimers[id]);
    saveTimers[id] = setTimeout(function(){
      if(usingFirebase && dbRef && state.verlage[id]){
        dbRef.child(id).set(state.verlage[id]).catch(function(err){
          console.error("Speicherfehler:", err);
          setSyncStatus("offline");
        });
      }
    }, 400);
  }

  function removeVerlagRemote(id){
    if(usingFirebase && dbRef){
      dbRef.child(id).remove().catch(function(err){ console.error(err); });
    }
  }

  /* ================= Render: KPIs ================= */
  function renderKPIs(){
    var el = document.getElementById("kpiRow");
    var all = Object.keys(state.verlage).map(function(id){ return state.verlage[id]; });
    var total = all.length;
    var counts = {pipeline:0, austausch:0, test:0, automatisiert:0};
    var overdueCount = 0;
    all.forEach(function(v){
      if(counts[v.status] !== undefined) counts[v.status]++;
      var ampel = getVerlagAmpel(v);
      if(ampel.level === "red") overdueCount++;
    });
    var pct = Math.min(Math.round((counts.automatisiert / TARGET_TOTAL) * 100), 100);
    el.innerHTML =
      '<div class="kpi-tile">' +
        '<div class="kpi-value">' + counts.automatisiert + ' / ' + TARGET_TOTAL + '</div>' +
        '<div class="kpi-label">Verlage automatisiert</div>' +
        '<div class="progress-bar-outer"><div class="progress-bar-inner" style="width:' + pct + '%"></div></div>' +
      '</div>' +
      '<div class="kpi-tile"><div class="kpi-value">' + total + '</div><div class="kpi-label">Verlage erfasst gesamt</div></div>' +
      '<div class="kpi-tile"><div class="kpi-value">' + counts.pipeline + '</div><div class="kpi-label">in Pipeline</div></div>' +
      '<div class="kpi-tile"><div class="kpi-value">' + counts.austausch + '</div><div class="kpi-label">im Austausch</div></div>' +

  /* ================= Render: Kanban Board ================= */
  function passesFilter(v){
    var s = state.filter.search.trim().toLowerCase();
    if(s){
      var hay = ((v.name||"") + " " + (v.kontaktVerlag||"") + " " + (v.zustaendigIntern||"")).toLowerCase();
      if(hay.indexOf(s) === -1) return false;
    }
    if(state.filter.status !== "all" && v.status !== state.filter.status) return false;
    if(state.filter.prioritaet !== "all" && v.prioritaet !== state.filter.prioritaet) return false;
    return true;
  }

      var countEl = document.querySelector('.column-count[data-status="' + st + '"]');

      var entries = Object.keys(state.verlage).filter(function(id){
        var v = state.verlage[id];
        return v.status === st && passesFilter(v);

      if(countEl) countEl.textContent = entries.length;
      if(entries.length === 0){
        listEl.innerHTML = '<p class="empty-hint">Keine Verlage in dieser Spalte.</p>';

      listEl.innerHTML = entries.map(function(id){ return renderCard(id, state.verlage[id]); }).join("");
    });

  function isTypingField(overlay){
    var el = document.activeElement;
    if(!overlay.contains(el)) return false;
    if(el.tagName === "TEXTAREA") return true;
    if(el.tagName === "INPUT" && el.type === "text") return true;
    return false;
  }

  function renderModal(force){
    var overlay = document.getElementById("modalOverlay");
    if(!state.selectedId || !state.verlage[state.selectedId]){
      overlay.classList.add("hidden");
      overlay.innerHTML = "";
      overlay.dataset.openId = "";
      return;
    }
    if(!force && overlay.dataset.openId === state.selectedId && isTypingField(overlay)){
      return;
    }
    overlay.dataset.openId = state.selectedId;
    var v = state.verlage[state.selectedId];
    overlay.innerHTML = renderModalHtml(state.selectedId, v);
    overlay.classList.remove("hidden");
  }

    overlay.classList.add("hidden");
    overlay.innerHTML = "";
    overlay.dataset.openId = "";

  /* ================= Render: Reminder Tab ================= */
  function computeReminders(){
    var overdue = [];
    var soon = [];
    Object.keys(state.verlage).forEach(function(id){
      var v = state.verlage[id];
      var contacts = getEffectiveContacts(v);
      contacts.forEach(function(c){
        var wd = c.date ? workdaysSince(c.date) : null;
        var item = {verlagId:id, verlagName:v.name, label:c.label, date:c.date, isWebsite:c.isWebsite, wid:c.wid, workdays: wd};
        if(wd === null || wd >= 3){
          item.sortWd = (wd === null) ? 999 : wd;
          overdue.push(item);
        } else if(wd === 2){
          item.sortWd = wd;
          soon.push(item);
        }
      });
    });
    overdue.sort(function(a,b){ return b.sortWd - a.sortWd; });
    soon.sort(function(a,b){ return b.sortWd - a.sortWd; });
    return {overdue: overdue, soon: soon};
  }

  function computeOpenTodos(){
    var list = [];
    Object.keys(state.verlage).forEach(function(id){
      var v = state.verlage[id];
      (v.todos || []).forEach(function(t){
        if(!t.erledigt){
          list.push({id:t.id, text:t.text, faellig:t.faellig, verlagId:id, verlagName:v.name});
        }
      });
    });
    list.sort(function(a,b){ return (a.faellig || "9999").localeCompare(b.faellig || "9999"); });
    return list;
  }

  function renderReminderItem(item){
    var dateDisp = item.date ? formatDate(item.date) : "kein Datum erfasst";

    return '' +
      '<div class="reminder-item">' +

        '</div>' +

  function renderGlobalTodo(t){
    var overdueTodo = t.faellig && t.faellig < todayISO();
    return '' +

        '<span class="todo-date">' + (t.faellig ? formatDate(t.faellig) : "kein Datum") + '</span>' +
      '</div>';
  }

  function renderReminder(){
    var el = document.getElementById("reminderView");
    var res = computeReminders();
    var todos = computeOpenTodos();
    var overdueHtml = res.overdue.length === 0
      ? '<p class="empty-hint">Keine überfälligen Kontakte 🎉</p>'
      : '<div class="reminder-list">' + res.overdue.map(renderReminderItem).join("") + '</div>';
    var soonHtml = res.soon.length === 0
      ? '<p class="empty-hint">Nichts aktuell bald fällig.</p>'
      : '<div class="reminder-list">' + res.soon.map(renderReminderItem).join("") + '</div>';
    var todosHtml = todos.length === 0
      ? '<p class="empty-hint">Keine offenen Todos.</p>'
      : '<div class="todo-list">' + todos.map(renderGlobalTodo).join("") + '</div>';

    el.innerHTML =
      '<div class="reminder-section"><h2>🔴 Überfällige Kontakte (≥ 3 Werktage ohne Kontakt)</h2>' + overdueHtml + '</div>' +
      '<div class="reminder-section"><h2>🟡 Bald fällig (2 Werktage seit Kontakt)</h2>' + soonHtml + '</div>' +
      '<div class="reminder-section"><h2>📝 Offene Todos</h2>' + todosHtml + '</div>';
  }

    document.getElementById("addVerlagForm").classList.add("hidden");
    document.getElementById("newVerlagName").value = "";
  });
  function submitNewVerlag(){
    var nameInput = document.getElementById("newVerlagName");
    var name = nameInput.value.trim();
    if(!name) return;
    var id = uid("v");
    state.verlage[id] = {
      name: name,
      kontaktVerlag: "",
      zustaendigIntern: "",
      prioritaet: "mittel",
      status: "pipeline",
      letzterKontakt: todayISO(),
      websitesUnabhaengig: false,
      notizen: "",
      todos: [],
      websites: {}
    };
    nameInput.value = "";
    document.getElementById("addVerlagForm").classList.add("hidden");
    renderApp();
    persist(id);
    openModal(id);
  }
  document.getElementById("confirmAddVerlag").addEventListener("click", submitNewVerlag);
  document.getElementById("newVerlagName").addEventListener("keydown", function(e){
    if(e.key === "Enter") submitNewVerlag();
  });

  /* ================= Event Listener: Kanban Board (Drag & Drop + Klicks) ================= */
  var kanbanView = document.getElementById("kanbanView");

  kanbanView.addEventListener("dragstart", function(e){
    var card = e.target.closest(".kanban-card");
    if(card){
      state.draggingId = card.dataset.id;
      e.dataTransfer.effectAllowed = "move";
      card.classList.add("dragging");
    }
  });
  kanbanView.addEventListener("dragend", function(e){
    var card = e.target.closest(".kanban-card");
    if(card) card.classList.remove("dragging");
    state.draggingId = null;
  });
  kanbanView.addEventListener("dragover", function(e){
    var list = e.target.closest(".card-list");
    if(list){
      e.preventDefault();
      list.classList.add("drag-over");
    }
  });
  kanbanView.addEventListener("dragleave", function(e){
    var list = e.target.closest(".card-list");
    if(list) list.classList.remove("drag-over");
  });
  kanbanView.addEventListener("drop", function(e){
    var list = e.target.closest(".card-list");
    if(list){
      e.preventDefault();
      list.classList.remove("drag-over");
      if(state.draggingId){
        changeStatus(state.draggingId, list.dataset.status);
        state.draggingId = null;
      }
    }
  });
  kanbanView.addEventListener("change", function(e){
    var select = e.target.closest(".status-select");
    if(select){
      var card = select.closest(".kanban-card");
      changeStatus(card.dataset.id, select.value);
    }
  });
  kanbanView.addEventListener("click", function(e){
    if(e.target.closest(".no-card-click")) return;
    var card = e.target.closest(".kanban-card");
    if(card) openModal(card.dataset.id);
  });

  /* ================= Event Listener: Modal ================= */
  var modalOverlay = document.getElementById("modalOverlay");

  modalOverlay.addEventListener("click", function(e){
    if(e.target.id === "modalOverlay"){
      closeModal();
      return;
    }
    var btn = e.target.closest("[data-action]");
    if(!btn) return;
    var action = btn.dataset.action;

    if(action === "close-modal"){ closeModal(); return; }

    var id = state.selectedId;
    if(!id || !state.verlage[id]) return;
    var v = state.verlage[id];
    var wid = btn.dataset.wid;
    var kid = btn.dataset.kid;
    var tid = btn.dataset.tid;

    if(action === "delete-verlag"){
      delete state.verlage[id];
      state.selectedId = null;
      removeVerlagRemote(id);
      renderApp();
      return;
    } else if(action === "toggle-override"){
      v.websitesUnabhaengig = !v.websitesUnabhaengig;
    } else if(action === "add-website"){
      var newWid = uid("w");
      if(!v.websites) v.websites = {};
      v.websites[newWid] = {name: "Neue Website", letzterKontakt: todayISO(), kanaele: {}};
    } else if(action === "remove-website"){
      if(v.websites) delete v.websites[wid];
    } else if(action === "add-kanal"){
      if(!v.websites || !v.websites[wid]) return;
      if(!v.websites[wid].kanaele) v.websites[wid].kanaele = {};
      var newKid = uid("k");
      v.websites[wid].kanaele[newKid] = {typ: "Mailing", format: "XLS", beispielLink: ""};
    } else if(action === "remove-kanal"){
      if(v.websites && v.websites[wid] && v.websites[wid].kanaele) delete v.websites[wid].kanaele[kid];
    } else if(action === "toggle-todo"){
      var t1 = (v.todos || []).find(function(t){ return t.id === tid; });
      if(t1) t1.erledigt = !t1.erledigt;
    } else if(action === "delete-todo"){
      v.todos = (v.todos || []).filter(function(t){ return t.id !== tid; });
    } else if(action === "add-todo"){
      var textInput = document.getElementById("newTodoText");
      var dateInput = document.getElementById("newTodoDate");
      var text = textInput.value.trim();
      if(!text) return;
      if(!v.todos) v.todos = [];
      v.todos.push({id: uid("t"), text: text, faellig: dateInput.value || "", erledigt:false});
    } else {
      return;
    }

    renderApp();
    persist(id);
  });

  modalOverlay.addEventListener("input", function(e){
    var field = e.target.dataset.field;
    if(!field) return;
    var id = state.selectedId;
    if(!id || !state.verlage[id]) return;
    var v = state.verlage[id];
    var wid = e.target.dataset.wid;
    var kid = e.target.dataset.kid;

    if(field === "name") v.name = e.target.value;
    else if(field === "kontaktVerlag") v.kontaktVerlag = e.target.value;
    else if(field === "zustaendigIntern") v.zustaendigIntern = e.target.value;
    else if(field === "notizen") v.notizen = e.target.value;
    else if(field === "website-name"){ if(v.websites && v.websites[wid]) v.websites[wid].name = e.target.value; }
    else if(field === "kanal-link"){ if(v.websites && v.websites[wid] && v.websites[wid].kanaele[kid]) v.websites[wid].kanaele[kid].beispielLink = e.target.value; }
    else return;

    renderApp();
    persist(id);
  });

  modalOverlay.addEventListener("change", function(e){
    var field = e.target.dataset.field;
    if(!field) return;
    var id = state.selectedId;
    if(!id || !state.verlage[id]) return;
    var v = state.verlage[id];
    var wid = e.target.dataset.wid;
    var kid = e.target.dataset.kid;

    if(field === "prioritaet") v.prioritaet = e.target.value;
    else if(field === "status") v.status = e.target.value;
    else if(field === "letzterKontakt") v.letzterKontakt = e.target.value;
    else if(field === "website-date"){ if(v.websites && v.websites[wid]) v.websites[wid].letzterKontakt = e.target.value; }
    else if(field === "kanal-typ"){ if(v.websites && v.websites[wid] && v.websites[wid].kanaele[kid]) v.websites[wid].kanaele[kid].typ = e.target.value; }
    else if(field === "kanal-format"){ if(v.websites && v.websites[wid] && v.websites[wid].kanaele[kid]) v.websites[wid].kanaele[kid].format = e.target.value; }
    else return;

    renderApp();
    persist(id);
  });

  modalOverlay.addEventListener("focusout", function(e){
    if(e.target.tagName === "TEXTAREA" || (e.target.tagName === "INPUT" && e.target.type === "text")){
      setTimeout(function(){ if(state.selectedId) renderModal(true); }, 50);
    }
  });

  document.addEventListener("keydown", function(e){
    if(e.key === "Escape" && state.selectedId) closeModal();
  });

  /* ================= Event Listener: Reminder Tab ================= */
  document.getElementById("reminderView").addEventListener("click", function(e){
    var btn = e.target.closest("[data-action]");
    if(!btn) return;
    var action = btn.dataset.action;
    var id = btn.dataset.id;
    var v = state.verlage[id];
    if(!v) return;

    if(action === "quick-contact"){
      var wid = btn.dataset.wid;
      if(wid && v.websites && v.websites[wid]){
        v.websites[wid].letzterKontakt = todayISO();
      } else {
        v.letzterKontakt = todayISO();
      }
      renderApp();
      persist(id);
    } else if(action === "toggle-todo-global"){
      var tid = btn.dataset.tid;
      var t = (v.todos || []).find(function(tt){ return tt.id === tid; });
      if(t) t.erledigt = true;
      renderApp();
      persist(id);
    }
  });

  /* ================= Start ================= */
  setSyncStatus("connecting");
  renderApp();
  initFirebase();

})();
</script>
</body>
</html>
