<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Verlags-Standardisierung Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/firebase@10.12.5/firebase-app-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@10.12.5/firebase-database-compat.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family: "Segoe UI", Arial, sans-serif; background:#f2f4f8; color:#1f2937; }
  header.app-header { background:#0f2540; color:#fff; padding:14px 22px; display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
  header.app-header h1 { font-size:18px; margin:0; margin-right:auto; }
  header.app-header input[type="text"] { padding:8px 12px; border-radius:8px; border:1px solid #33547a; background:#16324f; color:#fff; min-width:220px; }
  header.app-header input[type="text"]::placeholder { color:#9db4cc; }
  .btn-primary, .btn-add, .btn-secondary-sm, .btn-danger-sm, .btn-close {
    cursor:pointer; border:none; border-radius:7px; font-size:13px; padding:7px 12px; font-weight:600;
  }
  .btn-primary { background:#2f7ae0; color:#fff; }
  .btn-add { background:#e7f0fe; color:#2f5fae; border:1px dashed #9dbcec; margin-top:10px; width:100%; }
  .btn-secondary-sm { background:#eef1f5; color:#1f2937; }
  .btn-danger-sm { background:#ffe4e4; color:#b3261e; }
  .btn-close { background:#eee; color:#333; width:30px; height:30px; border-radius:50%; }

  .stats-bar { display:flex; gap:10px; padding:10px 22px; flex-wrap:wrap; }
  .stat-pill { background:#fff; border-radius:20px; padding:6px 14px; font-size:12px; box-shadow:0 1px 3px rgba(0,0,0,.08); }
  .stat-pill b { color:#0f2540; }

  #board { display:flex; gap:14px; padding:6px 22px 30px; overflow-x:auto; align-items:flex-start; }
  .column { background:#e7ebf1; border-radius:12px; min-width:270px; max-width:270px; padding:10px; flex-shrink:0; }
  .column-head { display:flex; align-items:center; justify-content:space-between; padding:4px 6px 10px; }
  .column-head h3 { margin:0; font-size:14px; color:#334155; }
  .count-badge { background:#0f2540; color:#fff; border-radius:10px; padding:1px 9px; font-size:12px; }
  .column-body { min-height:60px; display:flex; flex-direction:column; gap:8px; border-radius:8px; padding:2px; transition:background .15s; }
  .column-body.drag-over { background:#d5e3fb; }

  .card { background:#fff; border-radius:10px; padding:10px 12px; box-shadow:0 1px 4px rgba(0,0,0,.1); cursor:grab; }
  .card:active { cursor:grabbing; }
  .card-title { font-weight:700; font-size:13.5px; margin-bottom:4px; color:#0f2540; }
  .card-meta { font-size:12px; color:#64748b; }
  .reminder-badge { display:inline-block; margin-top:6px; font-size:11px; background:#fff4d6; color:#8a6100; border-radius:6px; padding:2px 7px; }
  .reminder-badge.overdue { background:#ffdada; color:#9c1c1c; }

  /* Overlays */
  #detailOverlay, #modalOverlay { position:fixed; inset:0; display:none; z-index:50; }
  #detailOverlay.open, #modalOverlay.open { display:flex; }
  #detailOverlay { background:rgba(15,37,64,.35); justify-content:flex-end; }
  #modalOverlay { background:rgba(15,37,64,.5); align-items:center; justify-content:center; padding:20px; }

  .detail-box { background:#fbfcfe; width:560px; max-width:100%; height:100%; overflow-y:auto; padding:20px; box-shadow:-4px 0 18px rgba(0,0,0,.15); }
  .detail-head { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .verlag-name-input { flex:1; font-size:18px; font-weight:700; border:1px solid transparent; background:transparent; padding:6px 8px; border-radius:6px; color:#0f2540; }
  .verlag-name-input:hover, .verlag-name-input:focus { border-color:#cfd8e3; background:#fff; outline:none; }
  .detail-head select { padding:6px 8px; border-radius:6px; border:1px solid #cfd8e3; font-size:13px; }
  .detail-reminder { display:flex; gap:10px; align-items:center; background:#fff; border-radius:8px; padding:10px; margin-bottom:16px; flex-wrap:wrap; }
  .detail-reminder input[type="date"], .detail-reminder input[type="text"] { padding:6px 8px; border-radius:6px; border:1px solid #cfd8e3; font-size:13px; }
  .detail-reminder input[type="text"] { flex:1; min-width:150px; }

  .website-block { background:#fff; border-radius:10px; padding:14px; margin-bottom:14px; border:1px solid #e5e9f0; }
  .website-block.gemeinsam-block { background:#f4f8ff; border-color:#c8dbfb; }
  .website-block-head { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .website-block-head h3 { margin:0; font-size:14px; flex:1; color:#1d3a63; }
  .website-name-input { flex:1; font-size:14px; font-weight:600; padding:6px 8px; border-radius:6px; border:1px solid transparent; }
  .website-name-input:hover, .website-name-input:focus { border-color:#cfd8e3; outline:none; }

  .uebersicht h4 { margin:6px 0; font-size:12.5px; color:#475569; text-transform:uppercase; letter-spacing:.03em; }
  table.kanal-table { width:100%; border-collapse:collapse; font-size:13px; }
  table.kanal-table th { text-align:left; color:#94a3b8; font-weight:600; font-size:11px; padding:4px 6px; border-bottom:1px solid #eef1f5; }
  table.kanal-table td { padding:6px; border-bottom:1px solid #f1f4f8; }
  .kanal-badge { display:inline-block; background:#eef4ff; color:#1e4f9c; border-radius:6px; padding:3px 9px; font-size:12px; }
  .empty-hint { color:#94a3b8; font-style:italic; font-size:12.5px; }

  /* Modal */
  .modal-box { background:#fff; border-radius:12px; width:640px; max-width:100%; max-height:88vh; display:flex; flex-direction:column; overflow:hidden; }
  .modal-head { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-bottom:1px solid #eef1f5; }
  .modal-head h3 { margin:0; font-size:15px; color:#0f2540; }
  .modal-body { padding:16px 18px; overflow-y:auto; flex:1; }
  .modal-foot { padding:12px 18px; border-top:1px solid #eef1f5; text-align:right; }

  .kanal-chip { background:#f8fafc; border:1px solid #e5e9f0; border-radius:10px; padding:12px; margin-bottom:12px; }
  .kanal-typ-checks { display:flex; flex-wrap:wrap; gap:6px 10px; margin-bottom:8px; }
  .pill-label { font-size:12.5px; background:#fff; border:1px solid #dce3ee; padding:4px 9px; border-radius:14px; cursor:pointer; display:inline-flex; align-items:center; gap:5px; }
  .kanal-link-input { width:100%; padding:7px 9px; border-radius:6px; border:1px solid #dce3ee; font-size:13px; margin-bottom:8px; }
  .kanal-chip-row2 { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
  .kanal-chip-row2 select, .kanal-chip-row2 input.systemtyp-custom {
    padding:7px 9px; border-radius:6px; border:1px solid #dce3ee; font-size:13px; background:#fff;
  }
  .kanal-chip-row2 select { min-width:150px; }
  .kanal-chip-row2 input.systemtyp-custom { flex:1; min-width:160px; }
</style>
</head>
<body>

<header class="app-header">
  <h1>📚 Verlags-Standardisierung Dashboard</h1>
  <input type="text" id="searchInput" placeholder="Verlag suchen…">
  <button type="button" class="btn-primary" id="addVerlagBtn">+ Neuer Verlag</button>
</header>

<div class="stats-bar" id="statsBar"></div>

<div id="board"></div>

<div id="detailOverlay"></div>
<div id="modalOverlay"></div>

<script>
(function(){
  "use strict";

  var KANAL_TYPEN = ["Mailing","Newsletter","Display","Native Ads","Social Media","Content-Kooperation","Gewinnspiel","Print-Beilage"];
  var SYSTEM_TYPEN = ["Mailchimp","CleverReach","Brevo","Salesforce Marketing Cloud","Emarsys","Google Ad Manager","Adition","Smart AdServer","Eigenes System","Sonstiges"];
  var FORMAT_OPTIONEN = ["XLS","CSV","PDF","API","Manuell","XML"];
  var KANBAN_SPALTEN = ["Neu","Kontaktiert","In Abstimmung","Umgesetzt","Abgeschlossen"];

  var VERLAGSNAMEN = [
    "Axel Springer","Bauer Media Group","Gruner + Jahr","Hubert Burda Media","Bertelsmann",
    "Funke Mediengruppe","Süddeutsche Zeitung","Frankfurter Allgemeine Zeitung","Die Zeit Verlagsgruppe","Spiegel Verlag",
    "Handelsblatt Media Group","Wirtschaftswoche","Der Tagesspiegel","Berliner Verlag","Rheinische Post Mediengruppe",
    "WAZ Mediengruppe","Stuttgarter Zeitung","Kölner Stadt-Anzeiger","Münchner Merkur","Augsburger Allgemeine",
    "Nürnberger Nachrichten","Badische Zeitung","Mitteldeutsche Zeitung","Sächsische Zeitung","Thüringer Allgemeine",
    "Ostsee-Zeitung","Nordkurier","Schwäbisches Tagblatt","Heilbronner Stimme","Rhein-Neckar-Zeitung",
    "Mannheimer Morgen","Wiesbadener Kurier","Frankfurter Rundschau","Darmstädter Echo","Trierischer Volksfreund",
    "Saarbrücker Zeitung","Kieler Nachrichten","Lübecker Nachrichten","Flensburger Tageblatt","Weser-Kurier",
    "Hannoversche Allgemeine Zeitung","Braunschweiger Zeitung","Neue Osnabrücker Zeitung","Westfälische Nachrichten","Ruhr Nachrichten",
    "Rheinische Post","Aachener Zeitung","Kölnische Rundschau","Bonner General-Anzeiger","Wiener Zeitung",
    "Der Standard","Kurier Österreich","Salzburger Nachrichten","Tiroler Tageszeitung","Neue Zürcher Zeitung",
    "Tages-Anzeiger","Blick","20 Minuten","Basler Zeitung","St. Galler Tagblatt",
    "Motor Presse Stuttgart","Klambt Verlag","Ippen Digital","Madsack Mediengruppe","DuMont Mediengruppe",
    "Verlagsgruppe Passau","Heinrich Bauer Verlag","Condé Nast Deutschland","Hearst Magazine Germany","Wunderweib Verlag",
    "Milchstraße Verlag","Ganske Verlagsgruppe","Jahreszeiten Verlag","Ehapa Media","Egmont Group",
    "Panini Verlag","Carlsen Verlag","Ravensburger Verlag","Cornelsen Verlag","Klett Verlag"
  ];

  function esc(s){
    return String(s == null ? "" : s).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];
    });
  }

  // ---------- Firebase ----------
  var firebaseConfig = {
    apiKey: "AIzaSyB6BpIB-v-1m9yQdqF7f8ak3VGziWyciYU",
    databaseURL: "https://testdashboard-db-default-rtdb.europe-west1.firebasedatabase.app"
  };
  var fbRef = null;
  try {
    var fbApp = firebase.initializeApp(firebaseConfig);
    var fbDb = firebase.database();
    fbRef = fbDb.ref("verlage");
  } catch(e){
    console.warn("Firebase konnte nicht initialisiert werden, arbeite lokal.", e);
    fbRef = null;
  }

  var saveTimer = null;
  function saveState(){
    if(!fbRef) return;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function(){
      try { fbRef.set(state.verlage); } catch(err){ console.warn("Speichern fehlgeschlagen", err); }
    }, 500);
  }

  // ---------- Seed ----------
  function buildSeed(){
    var verlage = {};
    VERLAGSNAMEN.forEach(function(name, i){
      var id = "v" + i;
      var slug = name.toLowerCase()
        .replace(/ä/g,"ae").replace(/ö/g,"oe").replace(/ü/g,"ue").replace(/ß/g,"ss")
        .replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"");
      var status = KANBAN_SPALTEN[i % KANBAN_SPALTEN.length];
      var websites = {};
      var wsCount = 1 + (i % 3);
      for(var j = 0; j < wsCount; j++){
        var wid = "w" + i + "_" + j;
        var kanaele = {};
        var kCount = 1 + ((i + j) % 3);
        for(var k = 0; k < kCount; k++){
          var kid = "k" + i + "_" + j + "_" + k;
          var typIdx = (i + j + k) % KANAL_TYPEN.length;
          var formatIdx = (i + k) % FORMAT_OPTIONEN.length;
          var hasSystem = (i + j + k) % 2 === 0;
          var sysIdx = (i + j + k) % SYSTEM_TYPEN.length;
          var systemTyp = hasSystem ? SYSTEM_TYPEN[sysIdx] : "";
          var systemTypCustom = systemTyp === "Sonstiges" ? "Internes Redaktionssystem" : "";
          kanaele[kid] = {
            typen: [KANAL_TYPEN[typIdx]],
            format: FORMAT_OPTIONEN[formatIdx],
            beispielLink: (j === 0 && k === 0) ? ("https://" + slug + ".de/beispiel") : "",
            systemTyp: systemTyp,
            systemTypCustom: systemTypCustom
          };
        }
        websites[wid] = {
          name: (j === 0 ? (slug + ".de") : (slug + "-" + (j + 1) + ".de")),
          kanaele: kanaele
        };
      }
      var gemeinsameKanaele = {};
      if(i % 4 === 0){
        var gid = "g" + i + "_0";
        gemeinsameKanaele[gid] = {
          typen: ["Newsletter"],
          format: "API",
          beispielLink: "",
          systemTyp: SYSTEM_TYPEN[i % SYSTEM_TYPEN.length],
          systemTypCustom: ""
        };
      }
      var reminder = null;
      if(i % 7 === 0){
        var d = new Date();
        d.setDate(d.getDate() + (i % 14) - 7);
        reminder = { date: d.toISOString().slice(0,10), text: "Rückfrage zur Kanalstandardisierung stellen" };
      }
      verlage[id] = {
        id: id, name: name, status: status,
        websites: websites, gemeinsameKanaele: gemeinsameKanaele, reminder: reminder
      };
    });
    return verlage;
  }

  // ---------- State ----------
  var state = {
    verlage: buildSeed(),
    detailId: null,
    modal: { open: false },
    filterText: "",
    modalDirty: false
  };

  // ---------- Helpers ----------
  function kanalBadgeText(k){
    var typen = (k.typen || []).join(", ") || "–";
    var txt = esc(typen) + " · " + esc(k.format || "–");
    var systemtyp = k.systemtyp || "";
    if(systemtyp){
      var systemLabel = systemtyp === "Sonstiges" ? (k.systemtypSonstiges || "Sonstiges") : systemtyp;
      txt += " · " + esc(systemLabel);
    }
    return txt;
  }

  // ---------- Render: Kanal Chips (Modal) ----------
  function renderKanal(wid, kid, k){
    var typChecks = KANAL_TYPEN.map(function(t){
      var checked = (k.typen && k.typen.indexOf(t) !== -1) ? "checked" : "";
      return '<label class="pill-label"><input type="checkbox" data-field="kanal-typ" data-wid="' + wid + '" data-kid="' + kid + '" data-typ="' + esc(t) + '" ' + checked + '> ' + esc(t) + '</label>';
    }).join("");

    var formatOptions = FORMAT_OPTIONEN.map(function(f){
      return '<option value="' + esc(f) + '" ' + (k.format === f ? "selected" : "") + '>' + esc(f) + '</option>';
    }).join("");

    var systemtyp = k.systemtyp || "";
    var systemOptions = '<option value="">– System wählen –</option>' + SYSTEM_TYPEN.map(function(s){
      return '<option value="' + esc(s) + '" ' + (systemtyp === s ? "selected" : "") + '>' + esc(s) + '</option>';
    }).join("");

    var sonstigesInput = "";
    if(systemtyp === "Sonstiges"){
      sonstigesInput = '<input type="text" class="kanal-link-input" data-field="kanal-systemtyp-sonstiges" data-wid="' + wid + '" data-kid="' + kid + '" value="' + esc(k.systemtypSonstiges || "") + '" placeholder="System eingeben...">';
    }

    return '' +
      '<div class="kanal-chip" data-kid="' + kid + '">' +
        '<div class="kanal-typ-checks">' + typChecks + '</div>' +
        '<input type="text" class="kanal-link-input" data-field="kanal-link" data-wid="' + wid + '" data-kid="' + kid + '" value="' + esc(k.beispielLink || "") + '" placeholder="Beispiel-Link...">' +
        '<div class="kanal-chip-row2">' +
          '<select data-field="kanal-format" data-wid="' + wid + '" data-kid="' + kid + '">' + formatOptions + '</select>' +
          '<select data-field="kanal-systemtyp" data-wid="' + wid + '" data-kid="' + kid + '">' + systemOptions + '</select>' +
          sonstigesInput +
          '<button type="button" class="btn-danger-sm" data-action="remove-kanal" data-wid="' + wid + '" data-kid="' + kid + '">🗑️</button>' +
        '</div>' +
      '</div>';
  }

  function renderGemeinsamerKanal(vid, kid, k){
    var typChecks = KANAL_TYPEN.map(function(t){
      var checked = (k.typen && k.typen.indexOf(t) !== -1) ? "checked" : "";
      return '<label class="pill-label"><input type="checkbox" data-field="gemeinsam-kanal-typ" data-wid="' + vid + '" data-kid="' + kid + '" data-typ="' + esc(t) + '" ' + checked + '> ' + esc(t) + '</label>';
    }).join("");

    var formatOptions = FORMAT_OPTIONEN.map(function(f){
      return '<option value="' + esc(f) + '" ' + (k.format === f ? "selected" : "") + '>' + esc(f) + '</option>';
    }).join("");

    var systemtyp = k.systemtyp || "";
    var systemOptions = '<option value="">– System wählen –</option>' + SYSTEM_TYPEN.map(function(s){
      return '<option value="' + esc(s) + '" ' + (systemtyp === s ? "selected" : "") + '>' + esc(s) + '</option>';
    }).join("");

    var sonstigesInput = "";
    if(systemtyp === "Sonstiges"){
      sonstigesInput = '<input type="text" class="kanal-link-input" data-field="gemeinsam-kanal-systemtyp-sonstiges" data-wid="' + vid + '" data-kid="' + kid + '" value="' + esc(k.systemtypSonstiges || "") + '" placeholder="System eingeben...">';
    }

    return '' +
      '<div class="kanal-chip" data-kid="' + kid + '">' +
        '<div class="kanal-typ-checks">' + typChecks + '</div>' +
        '<input type="text" class="kanal-link-input" data-field="gemeinsam-kanal-link" data-wid="' + vid + '" data-kid="' + kid + '" value="' + esc(k.beispielLink || "") + '" placeholder="Beispiel-Link...">' +
        '<div class="kanal-chip-row2">' +
          '<select data-field="gemeinsam-kanal-format" data-wid="' + vid + '" data-kid="' + kid + '">' + formatOptions + '</select>' +
          '<select data-field="gemeinsam-kanal-systemtyp" data-wid="' + vid + '" data-kid="' + kid + '">' + systemOptions + '</select>' +
          sonstigesInput +
          '<button type="button" class="btn-danger-sm" data-action="remove-gemeinsam-kanal" data-wid="' + vid + '" data-kid="' + kid + '">🗑️</button>' +
        '</div>' +
      '</div>';
  }

  // ---------- Render: Detail Website Block (Übersicht) ----------
  function renderDetailWebsiteBlock(vid, wid, w){
    var rows = Object.keys(w.kanaele || {}).map(function(kid){
      var k = w.kanaele[kid];
      var linkHtml = k.beispielLink ? ('<a href="' + esc(k.beispielLink) + '" target="_blank" rel="noopener">Link</a>') : "–";
      return '<tr><td><span class="kanal-badge">' + kanalBadgeText(k) + '</span></td><td>' + linkHtml + '</td></tr>';
    }).join("");
    if(!rows) rows = '<tr><td colspan="2" class="empty-hint">Keine Kanäle angelegt</td></tr>';

    return '' +
      '<div class="website-block" data-wid="' + wid + '">' +
        '<div class="website-block-head">' +
          '<input type="text" class="website-name-input" data-field="website-name" data-wid="' + wid + '" value="' + esc(w.name) + '">' +
          '<button type="button" class="btn-secondary-sm" data-action="edit-kanaele" data-wid="' + wid + '">✏️ Kanäle bearbeiten</button>' +
          '<button type="button" class="btn-danger-sm" data-action="remove-website" data-wid="' + wid + '">🗑️</button>' +
        '</div>' +
        '<div class="uebersicht"><h4>📊 Übersicht</h4>' +
          '<table class="kanal-table"><thead><tr><th>Kanal</th><th>Beispiel</th></tr></thead><tbody>' + rows + '</tbody></table>' +
        '</div>' +
      '</div>';
  }

  function renderGemeinsamUebersicht(v){
    var rows = Object.keys(v.gemeinsameKanaele || {}).map(function(kid){
      var k = v.gemeinsameKanaele[kid];
      var linkHtml = k.beispielLink ? ('<a href="' + esc(k.beispielLink) + '" target="_blank" rel="noopener">Link</a>') : "–";
      return '<tr><td><span class="kanal-badge">' + kanalBadgeText(k) + '</span></td><td>' + linkHtml + '</td></tr>';
    }).join("");
    if(!rows) rows = '<tr><td colspan="2" class="empty-hint">Keine gemeinsamen Kanäle</td></tr>';

    return '' +
      '<div class="website-block gemeinsam-block">' +
        '<div class="website-block-head">' +
          '<h3>🔗 Gemeinsame Kanäle</h3>' +
          '<button type="button" class="btn-secondary-sm" data-action="edit-gemeinsam">✏️ Bearbeiten</button>' +
        '</div>' +
        '<div class="uebersicht"><h4>📊 Übersicht</h4>' +
          '<table class="kanal-table"><thead><tr><th>Kanal</th><th>Beispiel</th></tr></thead><tbody>' + rows + '</tbody></table>' +
        '</div>' +
      '</div>';
  }

  // ---------- Render: Detail Panel ----------
  function renderDetailPanel(){
    var overlay = document.getElementById("detailOverlay");
    var vid = state.detailId;
    if(!vid || !state.verlage[vid]){
      overlay.classList.remove("open");
      overlay.innerHTML = "";
      return;
    }
    var v = state.verlage[vid];
    overlay.classList.add("open");

    var statusOptions = KANBAN_SPALTEN.map(function(s){
      return '<option value="' + esc(s) + '" ' + (v.status === s ? "selected" : "") + '>' + esc(s) + '</option>';
    }).join("");

    var websiteBlocks = Object.keys(v.websites || {}).map(function(wid){
      return renderDetailWebsiteBlock(vid, wid, v.websites[wid]);
    }).join("") || '<p class="empty-hint">Noch keine Websites angelegt.</p>';

    overlay.innerHTML = '' +
      '<div class="detail-box">' +
        '<div class="detail-head">' +
          '<input type="text" class="verlag-name-input" data-field="verlag-name" value="' + esc(v.name) + '">' +
          '<select data-field="verlag-status">' + statusOptions + '</select>' +
          '<button type="button" class="btn-close" data-action="close-detail">✕</button>' +
        '</div>' +
        '<div class="detail-reminder">' +
          '<label>🔔 Reminder: <input type="date" data-field="reminder-date" value="' + esc(v.reminder && v.reminder.date || "") + '"></label>' +
          '<input type="text" data-field="reminder-text" placeholder="Notiz..." value="' + esc(v.reminder && v.reminder.text || "") + '">' +
        '</div>' +
        '<div class="detail-websites">' + websiteBlocks + '</div>' +
        '<button type="button" class="btn-add" data-action="add-website">+ Website hinzufügen</button>' +
        renderGemeinsamUebersicht(v) +
      '</div>';
  }

  // ---------- Render: Modal ----------
  function renderModalHtml(){
    var m = state.modal;
    if(!m || !m.open) return "";
    var v = state.verlage[m.vid];
    if(!v) return "";
    var title, chipsHtml, addBtn;

    if(m.type === "website"){
      var w = v.websites[m.wid];
      if(!w) return "";
      title = "Kanäle bearbeiten – " + esc(w.name);
      chipsHtml = Object.keys(w.kanaele || {}).map(function(kid){
        return renderKanal(m.wid, kid, w.kanaele[kid]);
      }).join("") || '<p class="empty-hint">Noch keine Kanäle angelegt.</p>';
      addBtn = '<button type="button" class="btn-add" data-action="add-kanal" data-wid="' + m.wid + '">+ Kanal hinzufügen</button>';
    } else {
      title = "Gemeinsame Kanäle bearbeiten – " + esc(v.name);
      chipsHtml = Object.keys(v.gemeinsameKanaele || {}).map(function(kid){
        return renderGemeinsamerKanal(m.vid, kid, v.gemeinsameKanaele[kid]);
      }).join("") || '<p class="empty-hint">Noch keine gemeinsamen Kanäle angelegt.</p>';
      addBtn = '<button type="button" class="btn-add" data-action="add-gemeinsam-kanal" data-wid="' + m.vid + '">+ Gemeinsamen Kanal hinzufügen</button>';
    }

    return '' +
      '<div class="modal-box">' +
        '<div class="modal-head"><h3>' + title + '</h3><button type="button" class="btn-close" data-action="close-modal">✕</button></div>' +
        '<div class="modal-body">' + chipsHtml + addBtn + '</div>' +
        '<div class="modal-foot"><button type="button" class="btn-primary" data-action="close-modal">Fertig</button></div>' +
      '</div>';
  }

  function renderModal(force){
    var overlay = document.getElementById("modalOverlay");
    if(!state.modal || !state.modal.open){
      overlay.classList.remove("open");
      overlay.innerHTML = "";
    } else if(force){
      overlay.classList.add("open");
      overlay.innerHTML = renderModalHtml();
    }
    renderDetailPanel();
  }

  function openModal(type, vid, wid){
    state.modal = { open: true, type: type, vid: vid, wid: wid || null };
    renderModal(true);
  }
  function closeModal(){
    state.modal = { open: false };
    renderModal(true);
  }

  // ---------- Render: Board ----------
  function renderStats(){
    var bar = document.getElementById("statsBar");
    var counts = {};
    KANBAN_SPALTEN.forEach(function(s){ counts[s] = 0; });
    var total = 0;
    Object.keys(state.verlage).forEach(function(id){
      counts[state.verlage[id].status] = (counts[state.verlage[id].status] || 0) + 1;
      total++;
    });
    var html = '<span class="stat-pill">Gesamt: <b>' + total + '</b></span>';
    KANBAN_SPALTEN.forEach(function(s){
      html += '<span class="stat-pill">' + esc(s) + ': <b>' + (counts[s] || 0) + '</b></span>';
    });
    bar.innerHTML = html;
  }

  function renderCard(v){
    var card = document.createElement("div");
    card.className = "card";
    card.draggable = true;
    card.dataset.id = v.id;

    var wsCount = Object.keys(v.websites || {}).length;
    var kanalCount = 0;
    Object.keys(v.websites || {}).forEach(function(wid){
      kanalCount += Object.keys(v.websites[wid].kanaele || {}).length;
    });
    kanalCount += Object.keys(v.gemeinsameKanaele || {}).length;

    var reminderHtml = "";
    if(v.reminder && v.reminder.date){
      var today = new Date().toISOString().slice(0,10);
      var overdue = v.reminder.date < today;
      reminderHtml = '<div><span class="reminder-badge ' + (overdue ? "overdue" : "") + '">🔔 ' + esc(v.reminder.date) + '</span></div>';
    }

    card.innerHTML = '' +
      '<div class="card-title">' + esc(v.name) + '</div>' +
      '<div class="card-meta">🌐 ' + wsCount + ' Website(n) · 📡 ' + kanalCount + ' Kanäle</div>' +
      reminderHtml;

    card.addEventListener("click", function(){
      state.detailId = v.id;
      renderDetailPanel();
    });
    card.addEventListener("dragstart", function(e){
      e.dataTransfer.setData("text/plain", v.id);
    });
    return card;
  }

  function renderBoard(){
    renderStats();
    var board = document.getElementById("board");
    board.innerHTML = "";
    var filter = state.filterText.trim().toLowerCase();
    var verlageArr = Object.keys(state.verlage).map(function(id){ return state.verlage[id]; });

    KANBAN_SPALTEN.forEach(function(status){
      var col = document.createElement("div");
      col.className = "column";
      col.dataset.status = status;

      var list = verlageArr.filter(function(v){
        return v.status === status && (!filter || v.name.toLowerCase().indexOf(filter) !== -1);
      });

      col.innerHTML = '<div class="column-head"><h3>' + esc(status) + '</h3><span class="count-badge">' + list.length + '</span></div>' +
        '<div class="column-body" data-status="' + esc(status) + '"></div>';

      var body = col.querySelector(".column-body");
      list.forEach(function(v){ body.appendChild(renderCard(v)); });
      board.appendChild(col);
    });
  }

  // ---------- Event Listeners: Board / DnD ----------
  document.getElementById("board").addEventListener("dragover", function(e){
    var body = e.target.closest(".column-body");
    if(body){ e.preventDefault(); body.classList.add("drag-over"); }
  });
  document.getElementById("board").addEventListener("dragleave", function(e){
    var body = e.target.closest(".column-body");
    if(body) body.classList.remove("drag-over");
  });
  document.getElementById("board").addEventListener("drop", function(e){
    var body = e.target.closest(".column-body");
    if(!body) return;
    e.preventDefault();
    body.classList.remove("drag-over");
    var id = e.dataTransfer.getData("text/plain");
    var v = state.verlage[id];
    if(v){
      v.status = body.dataset.status;
      saveState();
      renderBoard();
      if(state.detailId === id) renderDetailPanel();
    }
  });

  document.getElementById("searchInput").addEventListener("input", function(e){
    state.filterText = e.target.value;
    renderBoard();
  });

  document.getElementById("addVerlagBtn").addEventListener("click", function(){
    var id = "v" + Date.now();
    state.verlage[id] = { id: id, name: "Neuer Verlag", status: KANBAN_SPALTEN[0], websites: {}, gemeinsameKanaele: {}, reminder: null };
    saveState();
    renderBoard();
    state.detailId = id;
    renderDetailPanel();
  });

  // ---------- Event Listeners: Detail Overlay ----------
  var detailOverlay = document.getElementById("detailOverlay");

  detailOverlay.addEventListener("click", function(e){
    if(e.target.id === "detailOverlay"){
      state.detailId = null;
      renderDetailPanel();
      return;
    }
    var btn = e.target.closest("[data-action]");
    if(!btn) return;
    var action = btn.dataset.action;
    var vid = state.detailId;
    var v = state.verlage[vid];
    var wid = btn.dataset.wid;

    if(action === "close-detail"){
      state.detailId = null;
      renderDetailPanel();
      return;
    }
    if(!v) return;

    if(action === "edit-kanaele"){
      openModal("website", vid, wid);
    } else if(action === "edit-gemeinsam"){
      openModal("gemeinsam", vid, null);
    } else if(action === "remove-website"){
      delete v.websites[wid];
      saveState();
      renderDetailPanel();
      renderBoard();
    } else if(action === "add-website"){
      var newWid = "w" + Date.now() + Math.floor(Math.random() * 1000);
      v.websites[newWid] = { name: "Neue Website", kanaele: {} };
      saveState();
      renderDetailPanel();
      renderBoard();
    }
  });

  detailOverlay.addEventListener("change", function(e){
    var field = e.target.dataset.field;
    if(!field) return;
    var v = state.verlage[state.detailId];
    if(!v) return;

    if(field === "verlag-status"){
      v.status = e.target.value;
      saveState();
      renderBoard();
    } else if(field === "reminder-date"){
      v.reminder = v.reminder || {};
      v.reminder.date = e.target.value;
      saveState();
      renderBoard();
    }
  });

  detailOverlay.addEventListener("input", function(e){
    var field = e.target.dataset.field;
    if(!field) return;
    var v = state.verlage[state.detailId];
    if(!v) return;

    if(field === "verlag-name"){
      v.name = e.target.value;
      saveState();
      renderBoard();
    } else if(field === "reminder-text"){
      v.reminder = v.reminder || {};
      v.reminder.text = e.target.value;
      saveState();
    } else if(field === "website-name"){
      var wid = e.target.dataset.wid;
      if(v.websites[wid]){
        v.websites[wid].name = e.target.value;
        saveState();
      }
    }
  });

  // ---------- Event Listeners: Modal Overlay ----------
  var modalOverlay = document.getElementById("modalOverlay");

  modalOverlay.addEventListener("click", function(e){
    if(e.target.id === "modalOverlay"){
      closeModal();
      return;
    }
    var btn = e.target.closest("[data-action]");
    if(!btn) return;
    var action = btn.dataset.action;
    var m = state.modal;
    if(!m || !m.open) return;
    var v = state.verlage[m.vid];
    if(!v) return;
    var wid = btn.dataset.wid;
    var kid = btn.dataset.kid;

    if(action === "close-modal"){
      closeModal();
      return;
    }
    if(action === "add-kanal"){
      var w = v.websites[wid];
      var newId = "k" + Date.now() + Math.floor(Math.random() * 1000);
      w.kanaele[newId] = { typen: ["Mailing"], format: "XLS", beispielLink: "", systemtyp: "", systemtypSonstiges: "" };
      state.modalDirty = true;
      saveState();
      renderModal(true);
      return;
    }
    if(action === "remove-kanal"){
      var w2 = v.websites[wid];
      delete w2.kanaele[kid];
      state.modalDirty = true;
      saveState();
      renderModal(true);
      return;
    }
    if(action === "add-gemeinsam-kanal"){
      var newGid = "g" + Date.now() + Math.floor(Math.random() * 1000);
      v.gemeinsameKanaele[newGid] = { typen: ["Mailing"], format: "XLS", beispielLink: "", systemtyp: "", systemtypSonstiges: "" };
      state.modalDirty = true;
      saveState();
      renderModal(true);
      return;
    }
    if(action === "remove-gemeinsam-kanal"){
      delete v.gemeinsameKanaele[kid];
      state.modalDirty = true;
      saveState();
      renderModal(true);
      return;
    }
  });

  modalOverlay.addEventListener("change", function(e){
    var field = e.target.dataset.field;
    if(!field) return;
    var m = state.modal;
    if(!m || !m.open) return;
    var v = state.verlage[m.vid];
    if(!v) return;
    var wid = e.target.dataset.wid;
    var kid = e.target.dataset.kid;

    if(field === "kanal-typ"){
      var k = v.websites[wid].kanaele[kid];
      var typ = e.target.dataset.typ;
      k.typen = k.typen || [];
      if(e.target.checked){
        if(k.typen.indexOf(typ) === -1) k.typen.push(typ);
      } else {
        k.typen = k.typen.filter(function(t){ return t !== typ; });
      }
    } else if(field === "kanal-format"){
      v.websites[wid].kanaele[kid].format = e.target.value;
    } else if(field === "kanal-systemtyp"){
      var kSys = v.websites[wid].kanaele[kid];
      kSys.systemtyp = e.target.value;
      if(e.target.value !== "Sonstiges"){
        kSys.systemtypSonstiges = "";
      }
    } else if(false){
    } else if(field === "gemeinsam-kanal-typ"){
      var gk = v.gemeinsameKanaele[kid];
      var typ2 = e.target.dataset.typ;
      gk.typen = gk.typen || [];
      if(e.target.checked){
        if(gk.typen.indexOf(typ2) === -1) gk.typen.push(typ2);
      } else {
        gk.typen = gk.typen.filter(function(t){ return t !== typ2; });
      }
    } else if(field === "gemeinsam-kanal-format"){
      v.gemeinsameKanaele[kid].format = e.target.value;
    } else if(field === "gemeinsam-kanal-systemtyp"){
      var gkSys = v.gemeinsameKanaele[kid];
      gkSys.systemtyp = e.target.value;
      if(e.target.value !== "Sonstiges"){
        gkSys.systemtypSonstiges = "";
      }
    } else {
      return;
    }

    state.modalDirty = true;
    saveState();
    renderModal(true);
  });

  modalOverlay.addEventListener("input", function(e){
    var field = e.target.dataset.field;
    if(!field) return;
    var m = state.modal;
    if(!m || !m.open) return;
    var v = state.verlage[m.vid];
    if(!v) return;
    var wid = e.target.dataset.wid;
    var kid = e.target.dataset.kid;

    if(field === "kanal-link"){
      v.websites[wid].kanaele[kid].beispielLink = e.target.value;
    } else if(field === "kanal-systemtyp-sonstiges"){
      v.websites[wid].kanaele[kid].systemtypSonstiges = e.target.value;
    } else if(field === "gemeinsam-kanal-link"){
      v.gemeinsameKanaele[kid].beispielLink = e.target.value;
    } else if(field === "gemeinsam-kanal-systemtyp-sonstiges"){
      v.gemeinsameKanaele[kid].systemtypSonstiges = e.target.value;
    } else {
      return;
    }

    state.modalDirty = true;
    saveState();
    renderModal(false);
  });

  // ---------- Init ----------
  function init(){
    renderBoard();
    renderDetailPanel();

    if(fbRef){
      fbRef.once("value").then(function(snap){
        var data = snap.val();
        if(data && Object.keys(data).length > 0){
          state.verlage = data;
        } else {
          fbRef.set(state.verlage).catch(function(err){ console.warn("Initiales Speichern fehlgeschlagen", err); });
        }
        renderBoard();
      }).catch(function(err){
        console.warn("Firebase Laden fehlgeschlagen, nutze Seed-Daten.", err);
      });
    }
  }

  init();
})();
</script>
</body>
</html>
